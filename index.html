function TatBadge({t}){
  return <span className="badge" style={{background:tatBg(t),color:tatColor(t),fontFamily:'var(--mono)'}}>{t==null?'—':t+'d'}</span>;
}

function RecruitmentView({data, me, upd, toast, openReq, logAudit}){
  const [fOwner,setFOwner]=useState(''); const [fMgr,setFMgr]=useState(''); const [fMod,setFMod]=useState('');
  const [fLoc,setFLoc]=useState(''); const [fPos,setFPos]=useState(''); const [fTat,setFTat]=useState(''); const [q,setQ]=useState('');
  const [mineOnly,setMineOnly]=useState(false);
  const [histReq,setHistReq]=useState(null);
  const fileRef = useRef();
  const reqs = data.reqs||[];
  const person = (id)=>data.people.find(p=>p.id===id);
  const personIdByName = (name)=>{ const n=String(name||'').trim().toLowerCase(); const p=data.people.find(x=>x.name.toLowerCase()===n || x.name.toLowerCase().startsWith(n)); return p?p.id:''; };

  const downloadTemplate = ()=>{
    exportRowsToExcel('recruitment-template.xlsx','Positions',
      ['Position','Modalities','Location','Hiring Manager','Experience','Priority','Approval Date','Recruitment Owner','Current Stage','Section','Candidate','Candidate Exp','Offered Date','Tentative Join','Actual Join Date'],
      [
        ['Sr_Scientist_ProcessChem','Process Chemistry','Ahmedabad','Dr. Sanjay Kulkarni','8-12 yrs','High','01-Jun-25','Rahul Verma','Sourcing','Open','','','','',''],
        ['Group_Leader_Synthesis','Synthetic Chemistry','Bengaluru','Dr. Anand Rao','12-15 yrs','High','15-May-25','Rahul Verma','Offer Pending','Offered','Dr. Nikhil Menon','13 yrs','20-Jul-25','20-Aug-25',''],
        ['Formulation_Scientist','Formulation','Hyderabad','Dr. Meera Nair','4-6 yrs','Medium','10-Apr-25','Priya Shah','Offer Pending','Joined','Aarti Desai','5 yrs','15-Jun-25','01-Jul-25','03-Jul-25'],
      ]);
  };

  const handleImport = (file)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const aoa=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,raw:true,cellDates:true});
        if(aoa.length<2){ toast('That file has no data rows'); return; }
        const cols=aoa[0].map(c=>String(c).trim().toLowerCase().replace(/[^a-z]/g,''));
        const ci=(...names)=>{ for(const n of names){ const i=cols.indexOf(n); if(i>=0)return i; } return -1; };
        const iPos=ci('position'), iMod=ci('modalities','modality'), iLoc=ci('location'), iMgr=ci('hiringmanager','manager'),
          iExp=ci('experience','experiencerequirement','exp'), iPri=ci('priority'), iApp=ci('approvaldate','approval'),
          iOwn=ci('recruitmentowner','owner','recruiter'), iStage=ci('currentstage','hiringstage'),
          iSection=ci('section','pipeline','status'), iCand=ci('candidate','candidatename'), iCandExp=ci('candidateexp','candidateexperience','totalexp'),
          iOffered=ci('offereddate','offerdate','offered'), iTen=ci('tentativejoin','tentativedateofjoining','tentative','yettojoin'),
          iJoin=ci('actualjoindate','joindate','dateofjoining','joined','joiningdate');
        if(iPos<0){ toast('No "Position" column found in the file'); return; }
        const sectionHint=(v)=>{ const s=String(v||'').trim().toLowerCase(); if(s.startsWith('offer'))return REQ_STAGE.OFFERED; if(s.startsWith('join'))return REQ_STAGE.JOINED; return REQ_STAGE.OPEN; };
        let added=0, o=0, off=0, j=0;
        upd(d=>{ if(!Array.isArray(d.reqs))d.reqs=[];
          aoa.slice(1).forEach(r=>{
            const position=String(r[iPos]||'').trim().replace(/\s+/g,'_'); if(!position) return;
            const pri=iPri>=0?String(r[iPri]||'').trim():''; const priority=REQ_PRIORITIES.find(p=>p.toLowerCase()===pri.toLowerCase())||'Medium';
            const offeredDate = iOffered>=0?parseToISO(r[iOffered]):'';
            const tentativeJoin = iTen>=0?parseToISO(r[iTen]):'';
            const joinDate = iJoin>=0?parseToISO(r[iJoin]):'';
            const hint = iSection>=0 ? sectionHint(r[iSection]) : null;
            // dates override the section hint
            const stage = inferStage(offeredDate, joinDate||tentativeJoin, hint);
            const rec={ id:uid(), createdAt:Date.now(), stage,
              position,
              modalities: iMod>=0?String(r[iMod]||'').trim():'',
              location: iLoc>=0?String(r[iLoc]||'').trim():'',
              hiringManagerId: iMgr>=0?personIdByName(r[iMgr]):'',
              experience: iExp>=0?String(r[iExp]||'').trim():'',
              priority,
              approvalDate: iApp>=0?parseToISO(r[iApp]):'',
              ownerId: iOwn>=0?personIdByName(r[iOwn]):'',
              currentStage: iStage>=0&&HIRING_STAGES.includes(String(r[iStage]||'').trim())?String(r[iStage]).trim():(stage===REQ_STAGE.OPEN?'Sourcing':'Offer Pending'),
              candidateName: iCand>=0?String(r[iCand]||'').trim():'',
              candidateExp: iCandExp>=0?String(r[iCandExp]||'').trim():'',
              offeredDate,
              tentativeJoin,
              // only set actual joinDate when it's today-or-past (i.e. actually joined); future dates stay as tentative
              joinDate: (joinDate && joinDate<=todayISO()) ? joinDate : '',
              backoutCount:0 };
            d.reqs.push(rec); added++;
            if(stage===REQ_STAGE.OPEN)o++; else if(stage===REQ_STAGE.OFFERED)off++; else j++;
          });
          logAudit(d,{entity:'Position',entityId:null,name:`${added} positions`,action:`imported (${o} open, ${off} offered, ${j} joined)`});
        });
        toast(`Imported ${added}: ${o} open, ${off} offered, ${j} joined`);
      }catch(err){ toast('Could not read that file'); }
    };
    reader.readAsArrayBuffer(file);
  };

  const modalities = [...new Set(reqs.map(r=>r.modalities).filter(Boolean))];
  const locations = [...new Set(reqs.map(r=>r.location).filter(Boolean))];
  const positions = [...new Set(reqs.map(r=>r.position).filter(Boolean))];

  const match = (r)=>{
    if(mineOnly && r.hiringManagerId!==me && r.ownerId!==me) return false;
    if(fOwner && r.ownerId!==fOwner) return false;
    if(fMgr && r.hiringManagerId!==fMgr) return false;
    if(fMod && r.modalities!==fMod) return false;
    if(fLoc && r.location!==fLoc) return false;
    if(fPos && r.position!==fPos) return false;
    if(fTat){ const t=reqTat(r); if(t==null) return false; if(fTat==='red'&&!(t>120))return false; if(fTat==='orange'&&!(t>90&&t<=120))return false; if(fTat==='green'&&!(t<=90))return false; }
    if(q){ const s=q.toLowerCase(); const hay=[r.position,r.modalities,r.location,r.candidateName,person(r.hiringManagerId)?.name,person(r.ownerId)?.name].filter(Boolean).join(' ').toLowerCase(); if(!hay.includes(s)) return false; }
    return true;
  };
  const filtered = reqs.filter(match);
  const open = filtered.filter(r=>r.stage===REQ_STAGE.OPEN);
  const offered = filtered.filter(r=>r.stage===REQ_STAGE.OFFERED);
  const joined = filtered.filter(r=>r.stage===REQ_STAGE.JOINED);

  // recruiter metrics (across ALL reqs, not filtered)
  const recruiters = data.people.filter(p=>reqs.some(r=>r.ownerId===p.id));
  const metrics = recruiters.map(p=>{
    const mine = reqs.filter(r=>r.ownerId===p.id);
    const joinedMine = mine.filter(r=>r.stage===REQ_STAGE.JOINED);
    const tats = joinedMine.map(r=>reqTat(r)).filter(t=>t!=null);
    const avg = tats.length? Math.round(tats.reduce((a,b)=>a+b,0)/tats.length) : null;
    const backouts = mine.reduce((s,r)=>s+(r.backoutCount||0),0);
    const closed = mine.filter(r=>r.stage===REQ_STAGE.OFFERED||r.stage===REQ_STAGE.JOINED).length;
    return {p, allocated:mine.length, closed, joined:joinedMine.length, backouts, avg};
  });

  const setStage = (id, stage, extra)=>upd(d=>{ const r=(d.reqs||[]).find(x=>x.id===id); if(!r) return; r.stage=stage; if(extra) Object.assign(r,extra); });
  const markOffered = (id)=>{ upd(d=>{ const r=(d.reqs||[]).find(x=>x.id===id); if(!r)return; r.stage=REQ_STAGE.OFFERED; r.currentStage='Offer Pending'; if(!r.offeredDate) r.offeredDate=todayISO(); logAudit(d,{entity:'Position',entityId:id,name:r.position,action:'moved to Offered',diffs:[{field:'Offered Date',from:'',to:fmtDMY(r.offeredDate)}]}); }); toast('Moved to Offered — add candidate details'); const r=(data.reqs||[]).find(x=>x.id===id); setTimeout(()=>openReq({...r, stage:REQ_STAGE.OFFERED, currentStage:'Offer Pending', offeredDate:r.offeredDate||todayISO()}), 60); };
  const markJoined = (id)=>{ upd(d=>{ const r=(d.reqs||[]).find(x=>x.id===id); if(!r)return; r.stage=REQ_STAGE.JOINED; if(!r.joinDate) r.joinDate=todayISO(); logAudit(d,{entity:'Position',entityId:id,name:r.position,action:'marked Joined',diffs:[{field:'Join Date',from:'',to:fmtDMY(r.joinDate)}]}); }); toast('Marked joined — TAT frozen'); };
  const markBackout = (id)=>{ upd(d=>{ const r=(d.reqs||[]).find(x=>x.id===id); if(!r)return; const cand=r.candidateName; r.stage=REQ_STAGE.OPEN; r.backoutCount=(r.backoutCount||0)+1; r.candidateName=''; r.candidateExp=''; r.tentativeJoin=''; r.joinDate=''; r.currentStage='Sourcing'; logAudit(d,{entity:'Position',entityId:id,name:r.position,action:'candidate backed out'+(cand?' ('+cand+')':''), }); }); toast('Candidate backed out — position re-opened'); };

  const isMine = (r)=> (r.hiringManagerId===me || r.ownerId===me);

  const Filters = <div style={{display:'flex',gap:9,alignItems:'center',flexWrap:'wrap',marginBottom:18}}>
    <div className="searchbox">{I.search()}<input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search positions, candidates…"/></div>
    <button className="pill-filter" style={mineOnly?{borderColor:'var(--primary)',background:'var(--primary-050)',color:'var(--primary-700)'}:{}} onClick={()=>setMineOnly(!mineOnly)}>{I.check({style:{width:14,height:14}})}Mine</button>
    <span className="pill-filter">{I.team({style:{width:14,height:14}})}<select value={fOwner} onChange={e=>setFOwner(e.target.value)}><option value="">All recruiters</option>{data.people.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></span>
    <span className="pill-filter">{I.team({style:{width:14,height:14}})}<select value={fMgr} onChange={e=>setFMgr(e.target.value)}><option value="">All hiring mgrs</option>{data.people.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></span>
    <span className="pill-filter">{I.flask({style:{width:14,height:14}})}<select value={fMod} onChange={e=>setFMod(e.target.value)}><option value="">All modalities</option>{modalities.map(m=><option key={m}>{m}</option>)}</select></span>
    <span className="pill-filter">{I.folder({style:{width:14,height:14}})}<select value={fLoc} onChange={e=>setFLoc(e.target.value)}><option value="">All locations</option>{locations.map(l=><option key={l}>{l}</option>)}</select></span>
    <span className="pill-filter">{I.target({style:{width:14,height:14}})}<select value={fPos} onChange={e=>setFPos(e.target.value)}><option value="">All positions</option>{positions.map(p=><option key={p}>{p}</option>)}</select></span>
    <span className="pill-filter">{I.clock({style:{width:14,height:14}})}<select value={fTat} onChange={e=>setFTat(e.target.value)}><option value="">Any TAT</option><option value="green">&lt;90 (green)</option><option value="orange">90–120 (orange)</option><option value="red">&gt;120 (red)</option></select></span>
  </div>;

  const colHead = (extra)=><tr>
    <th style={{width:44}}>#</th><th>Position</th><th>Modalities</th><th>Location</th><th>Hiring Mgr</th><th>Exp</th><th>Priority</th><th>Approval</th><th>TAT</th><th>Recruiter</th><th>Stage</th>{extra}<th></th>
  </tr>;

  const baseCells = (r,i)=>{ const mgr=person(r.hiringManagerId), own=person(r.ownerId), t=reqTat(r);
    return <>
      <td className="mono" style={{color:'var(--muted)'}}>{i+1}</td>
      <td><div style={{display:'flex',alignItems:'center',gap:7}}><span style={{fontWeight:600}}>{r.position}</span>{isMine(r)&&<span className="tag" style={{color:'var(--primary-700)',background:'var(--primary-050)',borderColor:'var(--primary-100)'}}>mine</span>}</div></td>
      <td>{r.modalities||'—'}</td>
      <td>{r.location||'—'}</td>
      <td>{mgr?<div style={{display:'flex',alignItems:'center',gap:7}}><Avatar person={mgr} size="sm"/><span style={{fontSize:12.5}}>{mgr.name.split(' ')[0]}</span></div>:'—'}</td>
      <td style={{fontSize:12.5}}>{r.experience||'—'}</td>
      <td><Badge cls={REQ_PRIO_CLASS[r.priority]}>{r.priority}</Badge></td>
      <td className="mono" style={{fontSize:12}}>{fmtDMY(r.approvalDate)}</td>
      <td><TatBadge t={t}/></td>
      <td>{own?<div style={{display:'flex',alignItems:'center',gap:7}}><Avatar person={own} size="sm"/><span style={{fontSize:12.5}}>{own.name.split(' ')[0]}</span></div>:'—'}</td>
      <td style={{fontSize:12.5}}>{r.currentStage||'—'}</td>
    </>;
  };

  return <div>
    {/* Recruiter metrics strip */}
    {metrics.length>0 && <div style={{marginBottom:20}}>
      <div className="section-title">{I.team({style:{width:15,height:15}})} Recruiter performance <span className="tt-line"></span></div>
      <div className="grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))'}}>
        {metrics.map(m=><div className="card card-pad" key={m.p.id} style={{padding:14}}>
          <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:10}}><Avatar person={m.p} size="sm"/><div style={{fontSize:13,fontWeight:600}}>{m.p.name}</div></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:5}}><span className="muted">Avg TAT (joined)</span><span className="mono" style={{fontWeight:700,color:tatColor(m.avg)}}>{m.avg==null?'—':m.avg+'d'}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:5}}><span className="muted">Allocated</span><span className="mono">{m.allocated}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:5}}><span className="muted">Closed</span><span className="mono">{m.closed}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12}}><span className="muted">Backouts</span><span className="mono" style={{color:m.backouts?'var(--red)':'var(--ink)'}}>{m.backouts}</span></div>
        </div>)}
      </div>
    </div>}

    {Filters}

    {/* A. Open positions */}
    <div className="section-title" style={{marginTop:4}}>{I.target({style:{width:15,height:15}})} A · Open positions <span className="tag" style={{marginLeft:2}}>{open.length}</span><span className="tt-line"></span>
      <button className="btn btn-sm btn-subtle" onClick={downloadTemplate} title="Download the Excel format">{I.download()}Template</button>
      <button className="btn btn-sm btn-subtle" onClick={()=>fileRef.current.click()}>{I.upload()}Import Excel</button>
      <button className="btn btn-sm btn-subtle" onClick={()=>exportRowsToExcel('recruitment-positions.xlsx','Positions',['Position','Modalities','Location','Hiring Manager','Experience','Priority','Approval Date','TAT (days)','Recruitment Owner','Current Stage','Section','Candidate','Cand. Exp','Offered Date','Tentative Join','Actual Join Date','Backouts'],reqs.map(r=>{const m=person(r.hiringManagerId),o=person(r.ownerId);return [r.position,r.modalities,r.location,m?m.name:'',r.experience,r.priority,fmtDMY(r.approvalDate),reqTat(r)??'',o?o.name:'',r.currentStage,r.stage,r.candidateName||'',r.candidateExp||'',fmtDMY(r.offeredDate),fmtDMY(r.tentativeJoin),fmtDMY(r.joinDate),r.backoutCount||0];}))} title="Export all positions">{I.download()}Export</button>
      <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleImport(e.target.files[0]);e.target.value='';}}/>
      <button className="btn btn-sm btn-primary" onClick={()=>openReq(null)}>{I.plus()}Add position</button>
    </div>
    {open.length? <div className="card" style={{overflow:'auto',marginBottom:24}}>
      <table className="tbl"><thead>{colHead()}</thead><tbody>
        {open.map((r,i)=><tr key={r.id} style={isMine(r)?{background:'var(--primary-050)'}:{}}>
          {baseCells(r,i)}
          <td><div style={{display:'flex',gap:4}}>
            <button className="btn btn-sm btn-subtle" onClick={()=>markOffered(r.id)} title="Mark offered">Offer</button>
            <button className="icon-btn" style={{width:28,height:28}} onClick={()=>setHistReq(r)} title="History">{I.clock({style:{width:14,height:14}})}</button>
            <button className="icon-btn" style={{width:28,height:28}} onClick={()=>openReq(r)}>{I.edit({style:{width:14,height:14}})}</button>
          </div></td>
        </tr>)}
      </tbody></table>
    </div> : <div className="card empty" style={{marginBottom:24}}>{I.target()}<h4>No open positions</h4><p>Add a position or adjust filters.</p><button className="btn btn-primary btn-sm" onClick={()=>openReq(null)}>{I.plus()}Add position</button></div>}

    {/* B. Offered */}
    <div className="section-title">{I.clock({style:{width:15,height:15}})} B · Offered — yet to join <span className="tag" style={{marginLeft:2}}>{offered.length}</span><span className="tt-line"></span></div>
    {offered.length? <div className="card" style={{overflow:'auto',marginBottom:24}}>
      <table className="tbl"><thead>{colHead(<><th>Candidate</th><th>Cand. Exp</th><th>Offered</th><th>Ten. Join</th></>)}</thead><tbody>
        {offered.map((r,i)=><tr key={r.id} style={isMine(r)?{background:'var(--primary-050)'}:{}}>
          {baseCells(r,i)}
          <td style={{fontWeight:600}}>{r.candidateName||'—'}</td>
          <td style={{fontSize:12.5}}>{r.candidateExp||'—'}</td>
          <td className="mono" style={{fontSize:12}}>{fmtDMY(r.offeredDate)}</td>
          <td className="mono" style={{fontSize:12}}>{fmtDMY(r.tentativeJoin)}</td>
          <td><div style={{display:'flex',gap:4}}>
            <button className="btn btn-sm btn-primary" onClick={()=>markJoined(r.id)} title="Mark joined">Joined</button>
            <button className="btn btn-sm btn-danger" onClick={()=>markBackout(r.id)} title="Candidate backed out">Backout</button>
            <button className="icon-btn" style={{width:28,height:28}} onClick={()=>setHistReq(r)} title="History">{I.clock({style:{width:14,height:14}})}</button>
            <button className="icon-btn" style={{width:28,height:28}} onClick={()=>openReq(r)}>{I.edit({style:{width:14,height:14}})}</button>
          </div></td>
        </tr>)}
      </tbody></table>
    </div> : <div className="card empty" style={{marginBottom:24}}>{I.clock()}<h4>No offered candidates</h4><p>Mark an open position "Offer" to move it here.</p></div>}

    {/* C. Joined */}
    <div className="section-title">{I.check({style:{width:15,height:15}})} C · Joined <span className="tag" style={{marginLeft:2}}>{joined.length}</span><span className="tt-line"></span></div>
    {joined.length? <div className="card" style={{overflow:'auto'}}>
      <table className="tbl"><thead>{colHead(<><th>Candidate</th><th>Cand. Exp</th><th>Join Date</th></>)}</thead><tbody>
        {joined.map((r,i)=><tr key={r.id} style={isMine(r)?{background:'var(--primary-050)'}:{}}>
          {baseCells(r,i)}
          <td style={{fontWeight:600}}>{r.candidateName||'—'}</td>
          <td style={{fontSize:12.5}}>{r.candidateExp||'—'}</td>
          <td className="mono" style={{fontSize:12}}>{fmtDMY(r.joinDate)}</td>
          <td><div style={{display:'flex',gap:4}}>
            <button className="icon-btn" style={{width:28,height:28}} onClick={()=>setHistReq(r)} title="History">{I.clock({style:{width:14,height:14}})}</button>
            <button className="icon-btn" style={{width:28,height:28}} onClick={()=>openReq(r)}>{I.edit({style:{width:14,height:14}})}</button>
          </div></td>
        </tr>)}
      </tbody></table>
    </div> : <div className="card empty">{I.check()}<h4>No joined candidates yet</h4><p>Mark an offered candidate "Joined" to move them here — TAT freezes at the join date.</p></div>}

    <p className="muted" style={{fontSize:11.5,marginTop:16,display:'flex',gap:16,flexWrap:'wrap'}}>
      <span><span style={{display:'inline-block',width:9,height:9,borderRadius:3,background:'var(--green)',marginRight:5}}></span>TAT &lt; 90 days</span>
      <span><span style={{display:'inline-block',width:9,height:9,borderRadius:3,background:'var(--amber)',marginRight:5}}></span>90–120 days</span>
      <span><span style={{display:'inline-block',width:9,height:9,borderRadius:3,background:'var(--red)',marginRight:5}}></span>&gt; 120 days</span>
    </p>

    {histReq && (()=>{ const entries=(data.audit||[]).filter(e=>e.entityId===histReq.id).sort((a,b)=>b.at-a.at);
      return <Modal icon={I.clock()} title={'History — '+histReq.position} onClose={()=>setHistReq(null)}
        foot={<button className="btn btn-ghost" onClick={()=>setHistReq(null)}>Close</button>}>
        {entries.length? <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {entries.map(e=>{ const p=person(e.by);
            return <div key={e.id} style={{display:'flex',gap:10,paddingBottom:10,borderBottom:'1px solid var(--line-2)'}}>
              <Avatar person={p} size="sm"/>
              <div style={{flex:1}}>
                <div style={{fontSize:13}}><b>{p?p.name:'—'}</b> <span className="muted">{e.action}</span></div>
                {e.diffs&&e.diffs.map((df,i)=><div key={i} style={{fontSize:12,color:'var(--ink-2)',marginTop:2}}>{df.field}: <span style={{color:'var(--muted)'}}>{String(df.from)||'—'}</span> → <b>{String(df.to)||'—'}</b></div>)}
                <div className="muted" style={{fontSize:11,marginTop:3}}>{fmtTs(e.at)}</div>
              </div>
            </div>;})}
        </div> : <p className="muted" style={{fontSize:13}}>No recorded changes for this position yet.</p>}
      </Modal>;
    })()}
  </div>;
}

   AUDIT LOG (global)
   ========================================================= */
function AuditView({data}){
  const [fEntity,setFEntity]=useState(''); const [fUser,setFUser]=useState(''); const [q,setQ]=useState('');
  const person=(id)=>data.people.find(p=>p.id===id);
  const all=[...(data.audit||[])].sort((a,b)=>b.at-a.at);
  const entities=[...new Set(all.map(e=>e.entity))];
  const filtered=all.filter(e=>{
    if(fEntity && e.entity!==fEntity) return false;
    if(fUser && e.by!==fUser) return false;
    if(q){ const s=q.toLowerCase(); const hay=[e.entity,e.action,e.name,person(e.by)?.name,...(e.diffs||[]).flatMap(d=>[d.field,d.from,d.to])].filter(Boolean).join(' ').toLowerCase(); if(!hay.includes(s)) return false; }
    return true;
  });
  const entityColor={Position:'var(--blue)',Action:'var(--primary)',KPI:'var(--violet)',Agenda:'var(--amber)',Team:'var(--green)'};
  const exportAudit=()=>exportRowsToExcel('chemops-audit-log.xlsx','Audit',
    ['When','User','Module','Item','Action','Changes'],
    filtered.map(e=>{const p=person(e.by);return [fmtTs(e.at),p?p.name:'',e.entity,e.name||'',e.action,(e.diffs||[]).map(d=>`${d.field}: ${d.from||'—'} -> ${d.to||'—'}`).join('; ')];}));

  return <div>
    <div style={{display:'flex',gap:9,alignItems:'center',flexWrap:'wrap',marginBottom:18}}>
      <div className="searchbox">{I.search()}<input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search audit trail…"/></div>
      <span className="pill-filter">{I.filter({style:{width:14,height:14}})}<select value={fEntity} onChange={e=>setFEntity(e.target.value)}><option value="">All modules</option>{entities.map(x=><option key={x}>{x}</option>)}</select></span>
      <span className="pill-filter">{I.team({style:{width:14,height:14}})}<select value={fUser} onChange={e=>setFUser(e.target.value)}><option value="">All users</option>{data.people.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></span>
      <button className="btn btn-ghost btn-sm" style={{marginLeft:'auto'}} onClick={exportAudit}>{I.download()}Export</button>
    </div>
    {filtered.length? <div className="card" style={{overflow:'hidden'}}>
      <table className="tbl">
        <thead><tr><th>When</th><th>User</th><th>Module</th><th>Item</th><th>Change</th></tr></thead>
        <tbody>
          {filtered.map(e=>{const p=person(e.by);
            return <tr key={e.id}>
              <td className="mono" style={{fontSize:11.5,whiteSpace:'nowrap',color:'var(--muted)'}}>{fmtTs(e.at)}</td>
              <td><div style={{display:'flex',alignItems:'center',gap:7}}><Avatar person={p} size="sm"/><span style={{fontSize:12.5}}>{p?p.name.split(' ')[0]:'—'}</span></div></td>
              <td><span className="tag" style={{color:entityColor[e.entity]||'var(--muted)'}}>{e.entity}</span></td>
              <td style={{fontSize:12.5,fontWeight:500,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.name||'—'}</td>
              <td style={{fontSize:12.5}}>
                <span className="muted">{e.action}</span>
                {e.diffs&&e.diffs.map((df,i)=><div key={i} style={{fontSize:11.5,marginTop:2}}>{df.field}: <span style={{color:'var(--muted)'}}>{String(df.from)||'—'}</span> → <b>{String(df.to)||'—'}</b></div>)}
              </td>
            </tr>;})}
        </tbody>
      </table>
    </div> : <div className="card empty">{I.clock()}<h4>No audit entries</h4><p>Changes across the app — edits, stage moves, deletes, imports — will appear here with who and when.</p></div>}
    <p className="muted" style={{fontSize:11.5,marginTop:12}}>Showing {filtered.length} of {all.length} logged change{all.length!==1?'s':''}. The trail keeps the most recent 2,000 entries.</p>
  </div>;
}

const NAV = [
  {id:'dashboard', label:'Dashboard', icon:I.dash},
  {id:'agenda', label:'Agenda', icon:I.agenda},
  {id:'actions', label:'Action Tracker', icon:I.tasks},
  {id:'recruitment', label:'Recruitment', icon:I.target},
  {id:'kpis', label:'KPIs', icon:I.target},
  {id:'trends', label:'Trends', icon:I.trend},
  {id:'data', label:'Data & Charts', icon:I.chart},
  {id:'meetings', label:'Meetings', icon:I.cal},
  {id:'team', label:'Team', icon:I.team},
  {id:'audit', label:'Audit Log', icon:I.clock},
  {id:'integrations', label:'Integrations', icon:I.link2},
];
const TITLES = {dashboard:'Dashboard', agenda:'Running Agenda', actions:'Action Tracker', recruitment:'Recruitment Pipeline', kpis:'KPI Library', trends:'Trends & Comparison', data:'Data & Charts', meetings:'Monthly Reviews', team:'Team', audit:'Audit Trail', integrations:'Integrations & Data Bridge'};

function App(){
  const [data,setData] = useState(null);
  const [loaded,setLoaded] = useState(false);
  const [me,setMe] = useState(null);
  const [view,setView] = useState('dashboard');
  const [toasts,setToasts] = useState([]);
  const [actionModal,setActionModal] = useState(undefined); // undefined=closed, null=new, obj=edit/prefill
  const [sectionModal,setSectionModal] = useState(undefined);
  const [kpiModal,setKpiModal] = useState(undefined);
  const [reqModal,setReqModal] = useState(undefined);
  const [showGate,setShowGate] = useState(false);
  const [cmdOpen,setCmdOpen] = useState(false);
  const [actionsFilter,setActionsFilter] = useState({});
  const [sidebarCollapsed,setSidebarCollapsed] = useState(false);
  // edit permission: when sharing via Firestore, viewers are read-only until they enter the passcode.
  // when running local-only (no Firestore) it's a single-user copy, so editing is always on.
  const [canEdit,setCanEdit] = useState(!hasFirestore || !window.EDIT_PASSCODE);
  const [passModal,setPassModal] = useState(false);
  const [passInput,setPassInput] = useState('');
  const userToggledSidebar = useRef(false);
  const saveTimer = useRef();

  const switchView = (v)=>{
    setActionsFilter({}); setView(v);
    // auto-collapse when entering a working module; keep expanded on the dashboard.
    // once the user manually toggles, respect their choice and stop auto-managing.
    if(!userToggledSidebar.current) setSidebarCollapsed(v!=='dashboard');
  };
  const toggleSidebar = ()=>{ userToggledSidebar.current = true; setSidebarCollapsed(c=>!c); };
  const gotoActions = (filter)=>{ setActionsFilter(filter||{}); setView('actions'); if(!userToggledSidebar.current) setSidebarCollapsed(true); };

  useEffect(()=>{
    const h=(e)=>{
      if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); setCmdOpen(o=>!o); }
    };
    window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h);
  },[]);

  const normalize = (d)=>{
    if(d && Array.isArray(d.agenda)){ d.agenda.sort((a,b)=>a.order-b.order).forEach((s,i)=>{ s.order = i+1; if(!Array.isArray(s.links)) s.links=[]; if(typeof s.prenotes!=='string') s.prenotes=''; }); }
    if(d && !Array.isArray(d.reqs)) d.reqs=[];
    if(d && Array.isArray(d.reqs)){ d.reqs.forEach(r=>{ if(typeof r.offeredDate!=='string') r.offeredDate=''; }); }
    if(d && !Array.isArray(d.audit)) d.audit=[];
    if(d && Array.isArray(d.kpis)){ const legacy=['Open Positions','Average TAT','Offer Acceptance','Joining Rate','Backouts']; d.kpis=d.kpis.filter(k=>!(k.cat==='Recruitment' && legacy.includes(k.name))); }
    if(d && Array.isArray(d.charts) && !d._unpinnedLeaderOcc){ d.charts.forEach(c=>{ if(c.title==='Leader-wise Occupancy') c.pinned=false; }); d._unpinnedLeaderOcc=true; }
    return d;
  };
  const lastRemoteJson = useRef(null);
  const suppressSave = useRef(false);

  useEffect(()=>{ (async()=>{
    let d = await Store.load();
    const wasEmpty = !d;
    if(!d) d = seedData();
    d = normalize(d);
    setData(d);
    // if Firestore is connected but had no doc yet, seed it so it becomes the shared source of truth
    if(hasFirestore && wasEmpty){ try{ await Store.save(d); }catch(e){} }
    const savedMe = await MeStore.get();
    if(savedMe && d.people.find(p=>p.id===savedMe)) setMe(savedMe);
    setLoaded(true);

    // real-time: apply remote updates from other users
    const unsub = Store.subscribe((remote)=>{
      const rj = JSON.stringify(remote);
      if(rj===lastRemoteJson.current) return;
      lastRemoteJson.current = rj;
      suppressSave.current = true; // don't echo this remote change straight back to the server
      setData(normalize(remote));
    });
    return ()=>{ if(unsub) unsub(); };
  })(); },[]);

  useEffect(()=>{
    if(!loaded||!data) return;
    if(suppressSave.current){ suppressSave.current=false; return; } // skip save for remote-applied updates
    if(!canEdit) return; // read-only viewers never write
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>{ lastRemoteJson.current = JSON.stringify(data); Store.save(data); }, 400);
  },[data,loaded]);

  const upd = useCallback((mutator)=>{
    setData(prev=>{ const next=JSON.parse(JSON.stringify(prev)); mutator(next); return next; });
  },[]);

  // audit logging — call inside an upd() mutator: logAudit(d, {...})
  const meRef = useRef(me);
  useEffect(()=>{ meRef.current = me; },[me]);
  const logAudit = useCallback((d, entry)=>{
    if(!Array.isArray(d.audit)) d.audit=[];
    d.audit.push({ id:uid(), at:Date.now(), by:meRef.current||null, ...entry });
    if(d.audit.length>2000) d.audit = d.audit.slice(-2000);
  },[]);

  const toast = useCallback((msg)=>{
    const id=uid(); setToasts(t=>[...t,{id,msg}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2600);
  },[]);

  const pickMe = (id)=>{ setMe(id); MeStore.set(id); setShowGate(false); };
  const addMe = (name,role)=>{ const id=uid(); upd(d=>{d.people.push({id,name,role,color:colorFor(name)}); logAudit(d,{entity:'Team',entityId:id,name,action:'added',by:id});}); setMe(id); MeStore.set(id); setShowGate(false); };

  const REQ_LABELS = {position:'Position',modalities:'Modalities',location:'Location',hiringManagerId:'Hiring Manager',experience:'Experience',priority:'Priority',approvalDate:'Approval Date',ownerId:'Recruitment Owner',currentStage:'Hiring Stage',stage:'Section',candidateName:'Candidate',candidateExp:'Cand. Exp',offeredDate:'Offered Date',tentativeJoin:'Tentative Join',joinDate:'Join Date'};

  // action ops
  const saveAction = (a)=>upd(d=>{ const i=d.actions.findIndex(x=>x.id===a.id); if(i>=0){ const diffs=diffFields(d.actions[i],a); d.actions[i]=a; if(diffs.length) logAudit(d,{entity:'Action',entityId:a.id,name:a.title,action:'edited',diffs}); } else { d.actions.push(a); logAudit(d,{entity:'Action',entityId:a.id,name:a.title,action:'created'}); } });
  const removeAction = (id)=>upd(d=>{ const a=d.actions.find(x=>x.id===id); d.actions=d.actions.filter(x=>x.id!==id); if(a) logAudit(d,{entity:'Action',entityId:id,name:a.title,action:'deleted'}); });
  const openAction = (a)=>setActionModal(a);
  const goto = (v, action)=>{ switchView(v); if(action) setTimeout(()=>setActionModal(action), 50); };
  // section ops
  const renumberAgenda = (d)=>{ d.agenda.sort((a,b)=>a.order-b.order).forEach((s,i)=>{ s.order = i+1; }); };
  const saveSection = (s)=>upd(d=>{ const i=d.agenda.findIndex(x=>x.id===s.id); if(i>=0){ const diffs=diffFields(d.agenda[i],s); d.agenda[i]={...d.agenda[i],...s}; if(diffs.length) logAudit(d,{entity:'Agenda',entityId:s.id,name:s.title,action:'edited',diffs}); } else { d.agenda.push({...s,order:(Math.max(0,...d.agenda.map(x=>x.order))+1),points:s.points||[],links:s.links||[],prenotes:s.prenotes||'',kpiIds:[],chartIds:[]}); logAudit(d,{entity:'Agenda',entityId:s.id,name:s.title,action:'created'}); } renumberAgenda(d); });
  const removeSection = (id)=>upd(d=>{ const s=d.agenda.find(x=>x.id===id); d.agenda=d.agenda.filter(x=>x.id!==id); if(s) logAudit(d,{entity:'Agenda',entityId:id,name:s.title,action:'deleted'}); renumberAgenda(d); });
  // kpi ops
  const saveKpi = (k)=>upd(d=>{ const i=d.kpis.findIndex(x=>x.id===k.id); if(i>=0){ const diffs=diffFields(d.kpis[i],k); d.kpis[i]=k; if(diffs.length) logAudit(d,{entity:'KPI',entityId:k.id,name:k.name,action:'edited',diffs}); } else { d.kpis.push(k); logAudit(d,{entity:'KPI',entityId:k.id,name:k.name,action:'created'}); } });
  const removeKpi = (id)=>upd(d=>{ const k=d.kpis.find(x=>x.id===id); d.kpis=d.kpis.filter(x=>x.id!==id); if(k) logAudit(d,{entity:'KPI',entityId:id,name:k.name,action:'deleted'}); });
  const saveReq = (r)=>upd(d=>{ if(!Array.isArray(d.reqs))d.reqs=[]; const i=d.reqs.findIndex(x=>x.id===r.id); if(i>=0){ const merged={...d.reqs[i],...r}; const diffs=diffFields(d.reqs[i],merged,REQ_LABELS); d.reqs[i]=merged; if(diffs.length) logAudit(d,{entity:'Position',entityId:r.id,name:merged.position,action:'edited',diffs}); } else { d.reqs.push(r); logAudit(d,{entity:'Position',entityId:r.id,name:r.position,action:'created'}); } });
  const removeReq = (id)=>upd(d=>{ const r=(d.reqs||[]).find(x=>x.id===id); d.reqs=(d.reqs||[]).filter(x=>x.id!==id); if(r) logAudit(d,{entity:'Position',entityId:id,name:r.position,action:'deleted'}); });
  const openReq = (r)=>setReqModal(r);

  if(!loaded||!data) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}}>Loading console…</div>;
  if(!me || showGate) return <Gate data={data} onPick={pickMe} onAdd={addMe}/>;

  const mePerson = data.people.find(p=>p.id===me);
  const openActionsCount = data.actions.filter(a=>a.status!=='Done').length;
  const myCount = data.actions.filter(a=>a.ownerId===me&&a.status!=='Done').length;

  return <div className="app">
    {/* SIDEBAR */}
    <aside className={cx('sidebar', sidebarCollapsed && 'collapsed')}>
      <div className="brand">
        <div className="brand-mark">{I.flask()}</div>
        <div><div className="brand-name">ChemOps</div><div className="brand-sub">HR × Chemistry</div></div>
      </div>
      <button className="sb-toggle" onClick={toggleSidebar} title={sidebarCollapsed?'Pin sidebar open':'Collapse sidebar'}>
        <span style={{transform:sidebarCollapsed?'rotate(180deg)':'none',display:'inline-flex',transition:'transform .22s'}}>{I.chevR()}</span>
        <span className="sb-toggle-label">{sidebarCollapsed?'Expand':'Collapse'}</span>
      </button>
      <nav className="nav">
        <div className="nav-label">Review</div>
        {NAV.slice(0,4).map(n=><button key={n.id} className={cx('nav-item',view===n.id&&'active')} onClick={()=>switchView(n.id)} title={n.label}>
          {n.icon()}<span>{n.label}</span>
          {n.id==='actions'&&openActionsCount>0&&<span className="nav-badge">{openActionsCount}</span>}
        </button>)}
        <div className="nav-label">Insights</div>
        {NAV.slice(4,7).map(n=><button key={n.id} className={cx('nav-item',view===n.id&&'active')} onClick={()=>switchView(n.id)} title={n.label}>{n.icon()}<span>{n.label}</span></button>)}
        <div className="nav-label">Manage</div>
        {NAV.slice(7).map(n=><button key={n.id} className={cx('nav-item',view===n.id&&'active')} onClick={()=>switchView(n.id)} title={n.label}>{n.icon()}<span>{n.label}</span></button>)}
      </nav>
      <div className="sidebar-foot">
        <button className="me-chip" onClick={()=>setShowGate(true)}>
          <Avatar person={mePerson} size="md"/>
          <div style={{flex:1,minWidth:0,textAlign:'left'}}><div className="me-name" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{mePerson.name}</div><div className="me-role">{myCount} open · switch</div></div>
          <span className="me-switch">{I.swap()}</span>
        </button>
      </div>
    </aside>

    {/* MAIN */}
    <div className="main">
      <header className="topbar">
        <div>
          <div className="crumb">{data.workspaceName}</div>
          <h2>{TITLES[view]}</h2>
        </div>
        <div className="topbar-actions">
          <button className="btn btn-ghost btn-sm" onClick={()=>setCmdOpen(true)} title="Search everything (⌘K)">{I.search()}Search<span className="cmdk-kbd" style={{marginLeft:4}}>⌘K</span></button>
          <NotifBell data={data} openAction={openAction}/>
          {hasFirestore && (canEdit
            ? <span className="edit-pill on" title="You can edit. Changes sync to everyone.">{I.check({style:{width:13,height:13}})}Editing</span>
            : <button className="edit-pill" onClick={()=>{setPassInput('');setPassModal(true);}} title="View only — enter passcode to edit">{I.lock?I.lock({style:{width:13,height:13}}):null}View only · Unlock</button>)}
          {view==='dashboard' && <button className="btn btn-ghost btn-sm" onClick={()=>window.print()}>{I.printer()}Export PDF</button>}
          {view==='actions' && <button className="btn btn-ghost btn-sm" onClick={()=>exportRowsToExcel('chemops-actions.xlsx','Actions',['Title','Owner','Priority','Status','Due Date','Agenda Item','Description'],data.actions.map(a=>{const p=data.people.find(x=>x.id===a.ownerId);const s=data.agenda.find(x=>x.id===a.sectionId);return [a.title,p?p.name:'',a.priority,a.status,a.dueDate||'',s?s.title:'',a.description||''];}))}>{I.download()}Export Excel</button>}
          {view==='kpis' && <button className="btn btn-ghost btn-sm" onClick={()=>exportRowsToExcel('chemops-kpis.xlsx','KPIs',['Category','Name','Value','Unit','Target','Direction'],data.kpis.map(k=>[k.cat,k.name,k.value,k.unit||'',k.target==null?'':k.target,k.dir]))}>{I.download()}Export Excel</button>}
          {canEdit && (view==='actions'||view==='dashboard') ? <button className="btn btn-primary" onClick={()=>openAction(null)}>{I.plus()}New action</button> : null}
          {canEdit && view==='agenda' ? <button className="btn btn-primary" onClick={()=>setSectionModal(null)}>{I.plus()}Add item</button> : null}
          {canEdit && view==='kpis' ? <button className="btn btn-primary" onClick={()=>setKpiModal(null)}>{I.plus()}New KPI</button> : null}
          {canEdit && view==='recruitment' ? <button className="btn btn-primary" onClick={()=>setReqModal(null)}>{I.plus()}Add position</button> : null}
        </div>
      </header>
      {hasFirestore && !canEdit && <div className="ro-banner">{I.eye?I.eye({style:{width:15,height:15}}):null}You're viewing in read-only mode. Data is shared live with your team. <button onClick={()=>{setPassInput('');setPassModal(true);}}>Enter passcode to edit</button></div>}
      <main className="content">
        <div className="content-inner">
        {view==='dashboard' && <Dashboard data={data} me={me} upd={upd} toast={toast} setView={switchView} gotoActions={gotoActions} openAction={openAction} openKpi={setKpiModal}/>}
        {view==='agenda' && <AgendaView data={data} me={me} upd={upd} toast={toast} openAction={openAction} editSection={setSectionModal}/>}
        {view==='actions' && <ActionsView data={data} me={me} upd={upd} toast={toast} openAction={openAction} initialFilters={actionsFilter}/>}
        {view==='recruitment' && <RecruitmentView data={data} me={me} upd={upd} toast={toast} openReq={openReq} logAudit={logAudit}/>}
        {view==='kpis' && <KpiManage data={data} upd={upd} openKpi={setKpiModal}/>}
        {view==='trends' && <TrendsView data={data}/>}
        {view==='data' && <ChartBuilder data={data} upd={upd} toast={toast}/>}
        {view==='meetings' && <MeetingsView data={data} upd={upd} toast={toast} setView={switchView}/>}
        {view==='team' && <TeamView data={data} upd={upd} me={me} toast={toast} logAudit={logAudit}/>}
        {view==='audit' && <AuditView data={data}/>}
        {view==='integrations' && <IntegrationsView data={data} upd={upd} toast={toast}/>}
        </div>
      </main>
    </div>

    {/* MOBILE NAV */}
    <nav className="mobile-nav">
      {NAV.map(n=><button key={n.id} className={cx(view===n.id&&'active')} onClick={()=>switchView(n.id)}>{n.icon()}<span style={{fontSize:10}}>{n.label.split(' ')[0]}</span></button>)}
    </nav>

    {/* MODALS */}
    {cmdOpen && <CommandPalette data={data} onClose={()=>setCmdOpen(false)} goto={goto}/>}
    {actionModal!==undefined && <ActionModal data={data} action={actionModal} me={me} onClose={()=>setActionModal(undefined)} save={saveAction} remove={removeAction}/>}
    {sectionModal!==undefined && <SectionModal section={sectionModal} onClose={()=>setSectionModal(undefined)} save={saveSection} remove={removeSection}/>}
    {kpiModal!==undefined && <KpiModal kpi={kpiModal} onClose={()=>setKpiModal(undefined)} save={saveKpi} remove={removeKpi}/>}
    {reqModal!==undefined && <RequisitionModal req={reqModal} data={data} me={me} onClose={()=>setReqModal(undefined)} save={saveReq} remove={removeReq}/>}
    {passModal && <Modal icon={I.lock?I.lock():I.check()} title="Enter edit passcode" onClose={()=>setPassModal(false)}
      foot={<>
        <button className="btn btn-ghost" onClick={()=>setPassModal(false)}>Cancel</button>
        <button className="btn btn-primary" onClick={()=>{ if(passInput===window.EDIT_PASSCODE){ setCanEdit(true); setPassModal(false); toast('Edit mode unlocked'); } else { toast('Incorrect passcode'); } }}>{I.check()}Unlock editing</button>
      </>}>
      <p style={{fontSize:13,color:'var(--ink-2)',marginBottom:12,lineHeight:1.6}}>Anyone with the link can view this workspace. Enter the shared team passcode to make changes — your edits then sync live to everyone.</p>
      <div className="field"><label>Passcode</label>
        <input className="input" type="password" autoFocus value={passInput} onChange={e=>setPassInput(e.target.value)} onKeyDown={e=>{ if(e.key==='Enter'){ if(passInput===window.EDIT_PASSCODE){ setCanEdit(true); setPassModal(false); toast('Edit mode unlocked'); } else { toast('Incorrect passcode'); } } }} placeholder="Team edit passcode"/>
      </div>
    </Modal>}

    {/* TOASTS */}
    <div className="toast-wrap">{toasts.map(t=><div className="toast" key={t.id}>{I.check()}{t.msg}</div>)}</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
