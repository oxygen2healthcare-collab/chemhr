<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChemOps Console — HR & Chemistry Monthly Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#EEF1EE;
    --surface:#FFFFFF;
    --surface-2:#F6F8F6;
    --ink:#12211D;
    --ink-2:#2C3B36;
    --muted:#657069;
    --muted-2:#8A948E;
    --line:#DFE4DF;
    --line-2:#EAEEEA;
    --primary:#0C7C5E;
    --primary-600:#0A6A50;
    --primary-700:#085541;
    --primary-050:#E4F1EC;
    --primary-100:#CBE6DC;
    --amber:#B7791F;
    --amber-bg:#FBF0DC;
    --red:#BC4A3D;
    --red-bg:#F7E3DF;
    --blue:#356089;
    --blue-bg:#E1EAF2;
    --violet:#6B5CA5;
    --violet-bg:#EAE7F4;
    --green:#3B7A57;
    --green-bg:#E1EFE6;
    --radius:14px;
    --radius-sm:10px;
    --shadow-sm:0 1px 2px rgba(18,33,29,.05), 0 1px 3px rgba(18,33,29,.04);
    --shadow:0 4px 14px rgba(18,33,29,.07), 0 1px 3px rgba(18,33,29,.05);
    --shadow-lg:0 18px 50px rgba(18,33,29,.16), 0 6px 18px rgba(18,33,29,.10);
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --display:'Space Grotesk','Inter',system-ui,sans-serif;
    --body:'Inter',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--body);
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
    line-height:1.5;
  }
  #root{min-height:100vh}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:14px;color:var(--ink)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#c8d0ca;border-radius:8px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:#b3bdb6}
  h1,h2,h3,h4{font-family:var(--display);margin:0;letter-spacing:-.01em}
  .mono{font-family:var(--mono)}

  /* ---------- Layout ---------- */
  .app{display:flex;height:100vh;overflow:hidden}
  .sidebar{
    width:242px;flex:0 0 242px;background:var(--ink);color:#DDE6E1;
    display:flex;flex-direction:column;height:100vh;
    padding:20px 14px;transition:width .22s cubic-bezier(.4,0,.2,1),flex-basis .22s cubic-bezier(.4,0,.2,1);
    z-index:50;overflow:hidden;flex-shrink:0;
  }
  /* collapsed: thin icon strip; expands on hover */
  .sidebar.collapsed{width:64px;flex-basis:64px}
  .sidebar.collapsed:hover{width:242px;flex-basis:242px;box-shadow:8px 0 30px rgba(0,0,0,.28)}
  .sidebar.collapsed:not(:hover) .brand-name,
  .sidebar.collapsed:not(:hover) .brand-sub,
  .sidebar.collapsed:not(:hover) .nav-label,
  .sidebar.collapsed:not(:hover) .nav-item span,
  .sidebar.collapsed:not(:hover) .nav-badge,
  .sidebar.collapsed:not(:hover) .me-name,
  .sidebar.collapsed:not(:hover) .me-role,
  .sidebar.collapsed:not(:hover) .me-switch,
  .sidebar.collapsed:not(:hover) .sb-toggle-label{opacity:0;pointer-events:none;white-space:nowrap}
  .sidebar.collapsed:not(:hover) .nav-item{justify-content:center;padding:9px 0}
  .sidebar.collapsed:not(:hover) .brand{justify-content:center;padding:6px 0 20px}
  .sidebar.collapsed:not(:hover) .nav-label{height:0;padding:0;margin:0}
  .sb-toggle{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border-radius:10px;color:#8A9A90;font-size:12px;font-weight:600;transition:background .15s;margin-bottom:4px}
  .sb-toggle:hover{background:rgba(255,255,255,.06);color:#fff}
  .sb-toggle svg{width:17px;height:17px;flex:0 0 17px;transition:transform .22s}
  .sidebar.collapsed:not(:hover) .sb-toggle{justify-content:center;padding:8px 0}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 20px 8px}
  .brand-mark{
    width:38px;height:38px;border-radius:11px;flex:0 0 38px;
    background:linear-gradient(145deg,var(--primary) 0%,#12A17B 100%);
    display:flex;align-items:center;justify-content:center;color:#fff;
    box-shadow:0 4px 12px rgba(12,124,94,.4);position:relative;overflow:hidden;
  }
  .brand-mark svg{width:22px;height:22px}
  .brand-name{font-family:var(--display);font-weight:700;font-size:15.5px;color:#fff;letter-spacing:-.02em;line-height:1.1}
  .brand-sub{font-size:10.5px;color:#7E9088;letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-top:2px}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:6px}
  .nav-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#69796F;font-weight:700;padding:14px 10px 6px}
  .nav-item{
    display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;
    color:#C0CEC7;font-weight:500;font-size:13.5px;transition:all .15s ease;text-align:left;width:100%;
  }
  .nav-item svg{width:18px;height:18px;flex:0 0 18px;opacity:.85}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-item.active{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(12,124,94,.35)}
  .nav-item.active svg{opacity:1}
  .nav-badge{margin-left:auto;background:rgba(255,255,255,.16);color:#fff;font-size:11px;font-weight:600;padding:1px 7px;border-radius:20px;font-family:var(--mono)}
  .nav-item.active .nav-badge{background:rgba(255,255,255,.22)}
  .sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)}
  .me-chip{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:11px;width:100%;transition:background .15s;text-align:left}
  .me-chip:hover{background:rgba(255,255,255,.06)}
  .me-name{font-size:13px;font-weight:600;color:#fff;line-height:1.15}
  .me-role{font-size:11px;color:#84958C}
  .me-switch{margin-left:auto;color:#7E9088}
  .me-switch svg{width:15px;height:15px}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .topbar{
    height:66px;flex-shrink:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);z-index:30;
    display:flex;align-items:center;gap:16px;padding:0 26px;
  }
  .topbar h2{font-size:19px;font-weight:600;color:var(--ink)}
  .topbar .crumb{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:1px;letter-spacing:.02em}
  .topbar-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
  .edit-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s}
  .edit-pill:hover{border-color:var(--primary);color:var(--primary-700)}
  .edit-pill.on{background:var(--primary-050);border-color:var(--primary-100);color:var(--primary-700);cursor:default}
  .ro-banner{flex-shrink:0;display:flex;align-items:center;gap:8px;background:#FBF3E2;border-bottom:1px solid #EBD9AE;color:#8A6D1F;font-size:12.5px;font-weight:500;padding:8px 26px}
  .ro-banner button{margin-left:6px;background:#8A6D1F;color:#fff;border-radius:7px;padding:4px 10px;font-size:12px;font-weight:600}
  .ro-banner button:hover{background:#725a19}
  .content{flex:1;overflow-y:auto;overflow-x:hidden;padding:26px;width:100%}
  .content-inner{max-width:1240px;width:100%;margin:0 auto}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:10px;
    font-weight:600;font-size:13.5px;transition:all .15s ease;white-space:nowrap;line-height:1;
    border:1px solid transparent;
  }
  .btn svg{width:16px;height:16px}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(12,124,94,.25)}
  .btn-primary:hover{background:var(--primary-600);box-shadow:0 4px 12px rgba(12,124,94,.32)}
  .btn-ghost{background:var(--surface);color:var(--ink-2);border-color:var(--line)}
  .btn-ghost:hover{background:var(--surface-2);border-color:#cfd6cf}
  .btn-subtle{background:var(--surface-2);color:var(--ink-2)}
  .btn-subtle:hover{background:#eaeeea}
  .btn-danger{background:var(--red-bg);color:var(--red)}
  .btn-danger:hover{background:#f2d5cf}
  .btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
  .btn-sm svg{width:14px;height:14px}
  .icon-btn{width:34px;height:34px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;border:1px solid transparent}
  .icon-btn:hover{background:var(--surface-2);color:var(--ink)}
  .icon-btn svg{width:17px;height:17px}
  button:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}

  /* ---------- Cards ---------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
  .card-pad{padding:20px}
  .grid{display:grid;gap:16px}
  .section-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:9px}
  .section-title .tt-line{flex:1;height:1px;background:var(--line)}

  /* ---------- Badges ---------- */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;line-height:1.4;white-space:nowrap}
  .badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .b-todo{background:#EDF0ED;color:#5A655E}
  .b-prog{background:var(--blue-bg);color:var(--blue)}
  .b-block{background:var(--red-bg);color:var(--red)}
  .b-done{background:var(--green-bg);color:var(--green)}
  .b-high{background:var(--red-bg);color:var(--red)}
  .b-med{background:var(--amber-bg);color:var(--amber)}
  .b-low{background:var(--surface-2);color:var(--muted)}
  .b-cat{background:var(--primary-050);color:var(--primary-700)}

  /* ---------- Avatars ---------- */
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;flex:0 0 auto;font-family:var(--display);letter-spacing:.02em;user-select:none}
  .avatar.sm{width:26px;height:26px;font-size:10.5px}
  .avatar.md{width:34px;height:34px;font-size:12.5px}
  .avatar.lg{width:44px;height:44px;font-size:15px}

  /* ---------- KPI ---------- */
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px;position:relative;overflow:hidden;transition:box-shadow .18s, transform .18s;cursor:pointer}
  .kpi:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
  .kpi-name{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.01em;display:flex;align-items:center;gap:6px}
  .kpi-val{font-family:var(--mono);font-size:29px;font-weight:600;color:var(--ink);line-height:1;margin:11px 0 3px;letter-spacing:-.02em}
  .kpi-val .unit{font-size:14px;color:var(--muted-2);font-weight:500;margin-left:2px}
  .kpi-foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
  .kpi-target{font-size:11px;color:var(--muted-2);font-family:var(--mono)}
  .delta{font-size:11.5px;font-weight:600;display:inline-flex;align-items:center;gap:3px;font-family:var(--mono)}
  .delta svg{width:12px;height:12px}
  .delta.up{color:var(--green)} .delta.down{color:var(--red)} .delta.flat{color:var(--muted-2)}
  .kpi-spark{position:absolute;right:14px;top:14px;opacity:.9}

  /* ---------- Inputs ---------- */
  .field{margin-bottom:15px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:6px;letter-spacing:.01em}
  .input,.textarea,.select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface-2);
    transition:all .15s;color:var(--ink);outline:none;
  }
  .input:focus,.textarea:focus,.select:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px var(--primary-050)}
  .textarea{resize:vertical;min-height:74px;line-height:1.55}
  .select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23657069' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 11px center;padding-right:34px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(18,33,29,.44);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:44px 18px;overflow-y:auto;animation:fade .18s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;animation:pop .2s cubic-bezier(.16,1,.3,1);overflow:hidden}
  .modal.wide{max-width:840px}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
  .modal-head{padding:20px 22px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:12px}
  .modal-head h3{font-size:17px;font-weight:600;flex:1}
  .modal-body{padding:22px}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line-2);display:flex;gap:10px;justify-content:flex-end;background:var(--surface-2)}

  /* ---------- Table ---------- */
  .tbl{width:100%;border-collapse:collapse}
  .tbl th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:11px 14px;border-bottom:1px solid var(--line)}
  .tbl td{padding:13px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tbody tr{transition:background .12s}
  .tbl tbody tr:hover{background:var(--surface-2)}

  /* ---------- Agenda ---------- */
  .agenda-item{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:box-shadow .18s}
  .agenda-item:hover{box-shadow:var(--shadow-sm)}
  .agenda-head{display:flex;align-items:center;gap:15px;padding:16px 18px;cursor:pointer;user-select:none}
  .agenda-num{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--primary);width:30px;flex:0 0 30px;text-align:center}
  .agenda-titles{flex:1;min-width:0}
  .agenda-titles h4{font-size:15.5px;font-weight:600;color:var(--ink);line-height:1.25}
  .agenda-desc{font-size:12.5px;color:var(--muted);margin-top:2px}
  .mins{font-size:11px;font-family:var(--mono);color:var(--muted);background:var(--surface-2);padding:3px 9px;border-radius:20px;border:1px solid var(--line-2);white-space:nowrap}
  .agenda-body{border-top:1px solid var(--line-2);padding:18px;background:var(--surface-2)}
  .point{display:flex;align-items:flex-start;gap:9px;padding:6px 0;font-size:13px;color:var(--ink-2)}
  .point .pk{width:5px;height:5px;border-radius:50%;background:var(--primary);margin-top:7px;flex:0 0 5px}
  .chip-add{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--primary);font-weight:600;padding:5px 10px;border-radius:8px;border:1px dashed var(--primary-100);background:var(--primary-050);transition:all .15s}
  .chip-add:hover{background:var(--primary-100)}

  /* ---------- Kanban ---------- */
  .kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kcol{background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--radius);padding:12px;min-height:120px}
  .kcol-head{display:flex;align-items:center;gap:8px;padding:2px 4px 12px;font-size:12.5px;font-weight:700;color:var(--ink-2)}
  .kcol-count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface);padding:1px 8px;border-radius:20px;border:1px solid var(--line)}
  .kcard{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:9px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .15s}
  .kcard:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
  .kcard-title{font-size:13.5px;font-weight:600;line-height:1.35;margin-bottom:9px}
  .kcard-meta{display:flex;align-items:center;gap:8px;justify-content:space-between}

  .empty{text-align:center;padding:48px 20px;color:var(--muted)}
  .empty svg{width:42px;height:42px;color:var(--muted-2);margin-bottom:12px}
  .empty h4{font-size:15px;color:var(--ink-2);margin-bottom:5px}
  .empty p{font-size:13px;max-width:340px;margin:0 auto 16px}

  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
  .seg button{padding:6px 13px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--muted);transition:all .15s}
  .seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}

  .pill-filter{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:9px;border:1px solid var(--line);background:var(--surface);font-size:12.5px;font-weight:500;color:var(--ink-2)}
  .pill-filter select{border:none;background:none;font-weight:600;color:var(--ink);outline:none;padding:0;cursor:pointer}

  .searchbox{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:0 12px;height:38px;min-width:200px}
  .searchbox input{border:none;background:none;outline:none;width:100%}
  .searchbox svg{width:16px;height:16px;color:var(--muted)}

  .link{color:var(--primary);font-weight:600;cursor:pointer}
  .link:hover{text-decoration:underline}
  .muted{color:var(--muted)}
  .overdue{color:var(--red);font-weight:600}
  .divider{height:1px;background:var(--line-2);margin:16px 0}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line-2);padding:2px 8px;border-radius:7px}

  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 600px at 70% -10%, #163a30 0%, #0d211c 55%, #0a1a16 100%);padding:24px}
  .gate-card{background:var(--surface);border-radius:22px;box-shadow:var(--shadow-lg);width:100%;max-width:480px;padding:34px;animation:pop .3s cubic-bezier(.16,1,.3,1)}
  .gate-people{display:flex;flex-direction:column;gap:8px;margin-top:6px;max-height:340px;overflow-y:auto}
  .gate-person{display:flex;align-items:center;gap:13px;padding:12px 14px;border:1px solid var(--line);border-radius:13px;transition:all .15s;text-align:left;width:100%;background:var(--surface)}
  .gate-person:hover{border-color:var(--primary);background:var(--primary-050);transform:translateX(2px)}

  .toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;animation:pop .2s}
  .toast svg{width:16px;height:16px;color:#5fd6ab}

  .stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border-radius:var(--radius);overflow:hidden;border:1px solid var(--line)}
  .stat-cell{background:var(--surface);padding:16px 18px;cursor:pointer;transition:background .15s}
  .stat-cell:hover{background:var(--surface-2)}
  .stat-cell .sv{font-family:var(--mono);font-size:23px;font-weight:600;letter-spacing:-.02em}
  .stat-cell .sl{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.05em}

  .updates{margin-top:8px;display:flex;flex-direction:column;gap:8px}
  .update{display:flex;gap:10px;font-size:12.5px;padding:9px 11px;background:var(--surface-2);border-radius:10px}
  .update .u-by{font-weight:600;color:var(--ink-2)}
  .update .u-at{color:var(--muted-2);font-size:11px}

  async load(){
    if(hasFirestore){
      try{ const snap = await DOC().get(); if(snap.exists){ const raw=snap.data().json; return raw?JSON.parse(raw):null; } return null; }
      catch(e){ console.error('Firestore load failed:',e); return null; }
    }
    if(hasCloud){
      try{ const r = await window.storage.get(KEY, true); return r ? JSON.parse(r.value) : null; }
      catch(e){ return null; }
    }
    try{ const raw = window.localStorage.getItem(KEY); return raw ? JSON.parse(raw) : null; }
    catch(e){ return null; }
  },
  async save(data){
    const v = JSON.stringify(data);
    if(hasFirestore){ try{ await DOC().set({json:v, updatedAt:Date.now()}); }catch(e){ console.error('Firestore save failed:',e); } return; }
    if(hasCloud){ try{ await window.storage.set(KEY, v, true); }catch(e){} return; }
    try{ window.localStorage.setItem(KEY, v); }catch(e){}
  },
  // real-time subscription — returns an unsubscribe fn, or null if not supported
  subscribe(onData){
    if(!hasFirestore) return null;
    try{
      return DOC().onSnapshot(snap=>{
        if(snap.metadata.hasPendingWrites) return; // ignore our own just-made local writes echoing back
        if(snap.exists){ const raw=snap.data().json; if(raw){ try{ onData(JSON.parse(raw)); }catch(e){} } }
      }, err=>console.error('Firestore subscribe error:',err));
    }catch(e){ return null; }
  }
};

// parse various input date formats to ISO
const parseToISO = (v) => {
  if(v==null || v==='') return '';
  // local-date formatter avoids UTC timezone shifting the day
  const fromDate = (d)=> `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  if(v instanceof Date && !isNaN(v)) return fromDate(v);

  if(typeof v==='number' && isFinite(v) && v>20000 && v<80000){
    const d = new Date(Math.round((v-25569)*86400*1000)); // 25569 = days between 1899-12-30 and 1970-01-01
    if(!isNaN(d)) return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }
  const s = String(v).trim();
  if(!s) return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  if(/^\d{4,5}$/.test(s)){ const n=parseInt(s,10); if(n>20000&&n<80000){ const d=new Date(Math.round((n-25569)*86400*1000)); if(!isNaN(d)) return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`; } }
  // DD-MMM-YY or DD-MMM-YYYY (e.g. 06-Oct-25, 6 Oct 2025)
  const m1 = s.match(/^(\d{1,2})[-/ ]([A-Za-z]{3,})[-/ ](\d{2,4})$/);
  if(m1){ const months=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec']; const mi=months.indexOf(m1[2].slice(0,3).toLowerCase()); if(mi>=0){ let y=m1[3]; if(y.length===2)y='20'+y; return `${y}-${String(mi+1).padStart(2,'0')}-${String(m1[1]).padStart(2,'0')}`; } }
  // MMM-DD-YY (e.g. Oct-06-25)
  const m1b = s.match(/^([A-Za-z]{3,})[-/ ](\d{1,2})[-/ ](\d{2,4})$/);
  if(m1b){ const months=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec']; const mi=months.indexOf(m1b[1].slice(0,3).toLowerCase()); if(mi>=0){ let y=m1b[3]; if(y.length===2)y='20'+y; return `${y}-${String(mi+1).padStart(2,'0')}-${String(m1b[2]).padStart(2,'0')}`; } }
  // DD/MM/YYYY or DD-MM-YY (day first, common in India)
  const m2 = s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{2,4})$/);
  if(m2){ let y=m2[3]; if(y.length===2)y='20'+y; return `${y}-${String(m2[2]).padStart(2,'0')}-${String(m2[1]).padStart(2,'0')}`; }
  const d=new Date(s); if(!isNaN(d)) return fromDate(d);

};

function Sparkline({data, color='#0C7C5E', w=70, h=26}){
  if(!data || data.length<2) return null;
  const min=Math.min(...data), max=Math.max(...data), rng=(max-min)||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/rng)*(h-4)-2}`).join(' ');
  const last=data[data.length-1], lx=w, ly=h-((last-min)/rng)*(h-4)-2;
  return <svg width={w} height={h} className="kpi-spark">
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    <circle cx={lx} cy={ly} r="2.4" fill={color}/>
  </svg>;
}

function ChartCanvas({type, labels, datasets, horizontal}){
  const ref = useRef(null), inst = useRef(null);
  useEffect(()=>{
    if(!ref.current || !window.Chart) return;
    if(inst.current){ inst.current.destroy(); }
    const isPie = type==='pie'||type==='doughnut';
    inst.current = new window.Chart(ref.current, {
      type: type==='area'?'line':type,
      data:{labels, datasets:datasets.map((d,i)=>{
        const c = SERIES_COLORS[i%SERIES_COLORS.length];
        if(isPie){
          return {...d, backgroundColor: d.data.map((_,j)=>SERIES_COLORS[j%SERIES_COLORS.length]), borderColor:'#fff', borderWidth:2};
        }
        return {...d, backgroundColor: type==='line'||type==='area'? c+'22': c, borderColor:c, borderWidth:2, borderRadius:6, tension:.35, fill:type==='area', pointBackgroundColor:c, pointRadius:type==='line'||type==='area'?3:0, maxBarThickness:46};
      })},
      options:{
        responsive:true, maintainAspectRatio:false,
        indexAxis: horizontal?'y':'x',
        plugins:{legend:{display:datasets.length>1||isPie, position:isPie?'right':'top', labels:{font:{family:'Inter',size:12}, usePointStyle:true, boxWidth:8, padding:14, color:'#2C3B36'}}},
        scales: isPie? {} : {
          x:{grid:{display:false}, ticks:{font:{family:'Inter',size:11}, color:'#657069'}, border:{color:'#DFE4DF'}},
          y:{grid:{color:'#EAEEEA'}, ticks:{font:{family:'IBM Plex Mono',size:11}, color:'#8A948E'}, border:{display:false}}
        }
      }
    });
    return ()=>{ if(inst.current){ inst.current.destroy(); inst.current=null; } };
  });
  return <canvas ref={ref}></canvas>;
}

function chartToConfig(chart, dataset){
  if(!dataset) return {labels:[],datasets:[]};
  const xi = dataset.columns.indexOf(chart.xCol);
  const labels = dataset.rows.map(r=>r[xi>=0?xi:0]);
  const isPie = chart.type==='pie'||chart.type==='doughnut';
  if(isPie){
    const yi = dataset.columns.indexOf(chart.yCols[0]);
    return {labels, datasets:[{label:chart.yCols[0], data:dataset.rows.map(r=>Number(r[yi])||0)}]};
  }
  return {labels, datasets: chart.yCols.map(yc=>{
    const yi=dataset.columns.indexOf(yc);
    return {label:yc, data:dataset.rows.map(r=>Number(r[yi])||0)};
  })};
}

function Modal({title, onClose, children, foot, wide, icon}){
  useEffect(()=>{
    const h=(e)=>{ if(e.key==='Escape') onClose(); };
    window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h);
  },[onClose]);
  return <div className="overlay" onMouseDown={onClose}>
    <div className={cx('modal',wide&&'wide')} onMouseDown={e=>e.stopPropagation()}>
      <div className="modal-head">
        {icon && <div style={{width:34,height:34,borderRadius:9,background:'var(--primary-050)',color:'var(--primary)',display:'flex',alignItems:'center',justifyContent:'center'}}>{icon}</div>}
        <h3>{title}</h3>
        <button className="icon-btn" onClick={onClose}>{I.x()}</button>
      </div>
      <div className="modal-body">{children}</div>
      {foot && <div className="modal-foot">{foot}</div>}
    </div>
  </div>;
}

/* =========================================================
   ACTION MODAL
   ========================================================= */
function ActionModal({data, action, me, onClose, save, remove}){
  const isExisting = !!(action && action.id);
  const blank = {title:'',description:'',ownerId:me,createdById:me,priority:'Medium',status:'To Do',dueDate:'',sectionId:''};
  const [f,setF] = useState(isExisting ? {...action} : {...blank, ...(action||{})});
  const [note,setNote] = useState('');
  const set = (k,v)=>setF(p=>({...p,[k]:v}));
  const people = data.people;
  const commit = ()=>{
    if(!f.title.trim()) return;
    const updates = f.updates ? [...f.updates] : [];
    if(note.trim()) updates.push({by:me, at:Date.now(), text:note.trim()});
    save({...f, updates, updatedAt:Date.now(), id:f.id||uid(), createdAt:f.createdAt||Date.now()});
    onClose();
  };
  return <Modal wide icon={I.tasks()} title={isExisting?'Edit action':'New action item'} onClose={onClose}
    foot={<>
      {isExisting && <button className="btn btn-danger" style={{marginRight:'auto'}} onClick={()=>{remove(action.id);onClose();}}>{I.trash()}Delete</button>}
      <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
      <button className="btn btn-primary" onClick={commit}>{I.check()}{isExisting?'Save changes':'Create action'}</button>
    </>}>
    <div className="field">
      <label>Action</label>
      <input className="input" autoFocus value={f.title} onChange={e=>set('title',e.target.value)} placeholder="What needs to be done?"/>
    </div>
    <div className="field">
      <label>Details</label>
      <textarea className="textarea" value={f.description} onChange={e=>set('description',e.target.value)} placeholder="Context, expected outcome…"/>
    </div>
    <div className="row2">
      <div className="field">
        <label>Owner</label>
        <select className="select" value={f.ownerId} onChange={e=>set('ownerId',e.target.value)}>
          {people.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </div>
      <div className="field">
        <label>Due date</label>
        <input type="date" className="input" value={f.dueDate||''} onChange={e=>set('dueDate',e.target.value)}/>
      </div>
    </div>
    <div className="row3">
      <div className="field">
        <label>Priority</label>
        <select className="select" value={f.priority} onChange={e=>set('priority',e.target.value)}>
          {PRIORITIES.map(p=><option key={p}>{p}</option>)}
        </select>
      </div>
      <div className="field">
        <label>Status</label>
        <select className="select" value={f.status} onChange={e=>set('status',e.target.value)}>
          {STATUSES.map(s=><option key={s}>{s}</option>)}
        </select>
      </div>
      <div className="field">
        <label>Agenda item</label>
        <select className="select" value={f.sectionId||''} onChange={e=>set('sectionId',e.target.value)}>
          <option value="">— none —</option>
          {data.agenda.map(s=><option key={s.id} value={s.id}>{s.order}. {s.title}</option>)}
        </select>
      </div>
    </div>
    {isExisting && <>
      <div className="divider"></div>
      <label style={{fontSize:12,fontWeight:600,color:'var(--ink-2)',display:'block',marginBottom:8}}>Progress updates</label>
      {(f.updates&&f.updates.length>0) ? <div className="updates" style={{marginBottom:12}}>
        {f.updates.slice().reverse().map((u,i)=>{
          const p=people.find(x=>x.id===u.by);
          return <div className="update" key={i}>
            <Avatar person={p} size="sm"/>
            <div style={{flex:1}}>
              <div><span className="u-by">{p?p.name:'—'}</span> <span className="u-at">· {relTime(u.at)}</span></div>
              <div style={{color:'var(--ink-2)',marginTop:2}}>{u.text}</div>
            </div>
          </div>;
        })}
      </div> : <p className="muted" style={{fontSize:12.5,marginBottom:12}}>No updates yet.</p>}
      <input className="input" value={note} onChange={e=>setNote(e.target.value)} placeholder="Add a progress update…" onKeyDown={e=>{if(e.key==='Enter'&&note.trim()){commit();}}}/>
    </>}
  </Modal>;
}

function KpiCard({k, onClick}){
  const dirGood = k.dir==='up';
  const prev = k.history[k.history.length-2], cur=k.value;
  const diff = cur-prev;
  const improving = dirGood ? diff>0 : diff<0;
  const dcls = Math.abs(diff)<0.05 ? 'flat' : (improving?'up':'down');
  const pct = prev? Math.round((diff/Math.abs(prev))*1000)/10 : 0;
  return <div className="kpi" onClick={onClick}>
    <Sparkline data={k.history} color={improving?'#3B7A57':'#BC4A3D'}/>
    <div className="kpi-name">{k.name}</div>
    <div className="kpi-val">{k.value}{k.unit&&<span className="unit">{k.unit}</span>}</div>
    <div className="kpi-foot">
      {k.target!=null ? <span className="kpi-target">target {k.target}{k.unit}</span> : <span className="kpi-target">&nbsp;</span>}
      <span className={cx('delta',dcls)}>
        {dcls==='up'?I.up():dcls==='down'?I.down():null}
        {diff>0?'+':''}{Math.round(diff*10)/10}{k.unit==='%'?'pp':''}
      </span>
    </div>
  </div>;
}

function Dashboard({data, me, upd, toast, setView, gotoActions, openAction, openKpi}){

  const done = data.actions.filter(a=>a.status==='Done').length;
  const openReqs = (data.reqs||[]).filter(r=>r.stage===REQ_STAGE.OPEN).length;
  const pinned = data.charts.filter(c=>c.pinned);
  const [cat,setCat] = useState('Recruitment');
  const catKpis = data.kpis.filter(k=>k.cat===cat);

  // live recruitment metrics computed from the pipeline
  const reqsAll = data.reqs||[];
  const totalReqs = reqsAll.length;
  const offeredN = reqsAll.filter(r=>r.stage===REQ_STAGE.OFFERED).length;
  const joinedN = reqsAll.filter(r=>r.stage===REQ_STAGE.JOINED).length;
  const backoutsN = reqsAll.reduce((s,r)=>s+(r.backoutCount||0),0);
  const ageingTats = reqsAll.filter(r=>r.stage!==REQ_STAGE.JOINED).map(r=>reqTat(r)).filter(t=>t!=null);
  const avgAgeingTat = ageingTats.length? Math.round(ageingTats.reduce((a,b)=>a+b,0)/ageingTats.length) : null;
  // location-based ageing TAT (India vs UK). Matches location text case-insensitively.
  const locTat = (match)=>{ const ts=reqsAll.filter(r=>r.stage!==REQ_STAGE.JOINED && match(String(r.location||'').toLowerCase())).map(r=>reqTat(r)).filter(t=>t!=null); return ts.length? Math.round(ts.reduce((a,b)=>a+b,0)/ts.length) : null; };
  const locCount = (match)=>reqsAll.filter(r=>r.stage!==REQ_STAGE.JOINED && match(String(r.location||'').toLowerCase())).length;
  const isIndia = (l)=>l.includes('india');
  const isUK = (l)=>l==='uk'||l.includes('united kingdom')||l.includes('u.k')||l.includes('britain')||l.includes('england');
  const indiaTat = locTat(isIndia), ukTat = locTat(isUK);

    {id:'live-join', name:'Joining Rate', value:joinPct, unit:'%', hint:'Joined ÷ all positions'},

  ];

  return <div>
    {/* headline strip */}

      <div className="stat-cell" onClick={()=>gotoActions({doneOnly:true})} title="View completed actions"><div className="sv" style={{color:'var(--green)'}}>{done}</div><div className="sl">Completed</div></div>
    </div>

    <div className="grid" style={{gridTemplateColumns:'1fr 340px', alignItems:'start'}}>
      <div>
        {/* KPIs */}
        <div style={{display:'flex',alignItems:'center',marginBottom:12}}>
          <div className="section-title" style={{margin:0}}>{I.target({style:{width:15,height:15}})} Monthly KPIs {cat==='Recruitment' && <span className="tag" style={{marginLeft:8,color:'var(--primary-700)',background:'var(--primary-050)',borderColor:'var(--primary-100)'}}>live from pipeline</span>}</div>
          <div className="seg" style={{marginLeft:'auto'}}>
            {KPI_CATS.map(c=><button key={c} className={cx(cat===c&&'on')} onClick={()=>setCat(c)}>{c}</button>)}

        </div>
        {cat==='Recruitment' ? <div className="grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:24}}>
          {recruitmentLive.map(m=><div className="kpi" key={m.id} onClick={()=>setView('recruitment')} title="Open recruitment pipeline">
            <div className="kpi-name">{m.name}</div>
            <div className="kpi-val" style={m.color?{color:m.color}:{}}>{m.value}{m.unit&&<span className="unit">{m.unit}</span>}</div>
            <div className="kpi-foot"><span className="kpi-target">{m.hint}</span><span className="delta flat">{I.chevR({style:{width:12,height:12}})}</span></div>

        </div> : <div className="grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:24}}>
          {catKpis.map(k=><KpiCard key={k.id} k={k} onClick={()=>openKpi(k)}/>)}

              <div className="kpi-foot"><span className="kpi-target">{ukN} open/offered position{ukN!==1?'s':''}</span><span className="delta flat">{I.chevR({style:{width:12,height:12}})}</span></div>
            </div>
          </div>
        </>}

        {/* Pinned charts */}
        <div className="section-title">{I.chart({style:{width:15,height:15}})} Pinned charts <span className="tt-line"></span>
          <button className="btn btn-sm btn-subtle" onClick={()=>setView('data')}>{I.plus()}Manage</button>
        </div>
        <div className="grid" style={{gridTemplateColumns:'1fr 1fr'}}>
          {pinned.length? pinned.map(c=>{

            return <div className="card card-pad" key={c.id}>

   ACTIONS
   ========================================================= */
function ActionsView({data, me, upd, toast, openAction, initialFilters}){
  const [mode,setMode] = useState('board');
  const [fOwner,setFOwner]=useState(''); const [fPrio,setFPrio]=useState(''); const [fSec,setFSec]=useState('');
  const [mine,setMine]=useState(false); const [q,setQ]=useState('');
  const [overdueOnly,setOverdueOnly] = useState(!!(initialFilters&&initialFilters.overdueOnly));
  const [doneOnly,setDoneOnly] = useState(!!(initialFilters&&initialFilters.doneOnly));
  const people=data.people;
  const filtered = data.actions.filter(a=>{
    if(mine && a.ownerId!==me) return false;
    if(fOwner && a.ownerId!==fOwner) return false;
    if(fPrio && a.priority!==fPrio) return false;
    if(fSec && a.sectionId!==fSec) return false;
    if(overdueOnly && !isOverdue(a.dueDate,a.status)) return false;
    if(doneOnly && a.status!=='Done') return false;
    if(q && !(a.title.toLowerCase().includes(q.toLowerCase())||(a.description||'').toLowerCase().includes(q.toLowerCase()))) return false;
    return true;
  });
  const setStatus=(id,s)=>upd(d=>{const a=d.actions.find(x=>x.id===id); if(a){a.status=s;a.updatedAt=Date.now();}});
  const secName=(sid)=>{const s=data.agenda.find(x=>x.id===sid);return s?`${s.order}. ${s.title}`:null;};

  const Filters = <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:18}}>
    <div className="searchbox">{I.search()}<input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search actions…"/></div>
    <button className={cx('pill-filter')} style={mine?{borderColor:'var(--primary)',background:'var(--primary-050)',color:'var(--primary-700)'}:{}} onClick={()=>setMine(!mine)}>{I.check({style:{width:14,height:14}})}My tasks</button>
    <button className={cx('pill-filter')} style={overdueOnly?{borderColor:'var(--red)',background:'var(--red-bg)',color:'var(--red)'}:{}} onClick={()=>setOverdueOnly(!overdueOnly)}>{I.clock({style:{width:14,height:14}})}Overdue</button>
    <button className={cx('pill-filter')} style={doneOnly?{borderColor:'var(--green)',background:'var(--green-bg)',color:'var(--green)'}:{}} onClick={()=>setDoneOnly(!doneOnly)}>{I.check({style:{width:14,height:14}})}Completed</button>
    <span className="pill-filter">{I.team({style:{width:14,height:14}})}<select value={fOwner} onChange={e=>setFOwner(e.target.value)}><option value="">All owners</option>{people.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></span>
    <span className="pill-filter">{I.flag({style:{width:14,height:14}})}<select value={fPrio} onChange={e=>setFPrio(e.target.value)}><option value="">Any priority</option>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select></span>
    <span className="pill-filter">{I.agenda({style:{width:14,height:14}})}<select value={fSec} onChange={e=>setFSec(e.target.value)}><option value="">All agenda items</option>{data.agenda.map(s=><option key={s.id} value={s.id}>{s.order}. {s.title}</option>)}</select></span>
    <div className="seg" style={{marginLeft:'auto'}}>
      <button className={cx(mode==='board'&&'on')} onClick={()=>setMode('board')}>Board</button>
      <button className={cx(mode==='list'&&'on')} onClick={()=>setMode('list')}>List</button>
    </div>
    <button className="btn btn-primary" onClick={()=>openAction(null)}>{I.plus()}New action</button>
  </div>;

  if(filtered.length===0) return <div>{Filters}<div className="card empty">{I.tasks()}<h4>No actions match</h4><p>Adjust the filters, or create a new action item to get started.</p><button className="btn btn-primary" onClick={()=>openAction(null)}>{I.plus()}New action</button></div></div>;

  if(mode==='board'){
    return <div>{Filters}
      <div className="kanban">
        {STATUSES.map(st=>{
          const col=filtered.filter(a=>a.status===st);
          return <div className="kcol" key={st}>
            <div className="kcol-head"><StatusBadge s={st}/><span className="kcol-count">{col.length}</span></div>
            {col.map(a=>{const p=people.find(x=>x.id===a.ownerId);const od=isOverdue(a.dueDate,a.status);
              return <div className="kcard" key={a.id} onClick={()=>openAction(a)}>
                <div className="kcard-title">{a.title}</div>
                {a.sectionId&&<div className="tag" style={{marginBottom:8}}>{secName(a.sectionId)}</div>}
                <div className="kcard-meta">
                  <PrioBadge p={a.priority}/>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:'auto'}}>
                    <span className={cx('tag',od&&'overdue')} style={od?{borderColor:'var(--red-bg)'}:{}}>{fmtDate(a.dueDate)}</span>
                    <Avatar person={p} size="sm"/>
                  </div>
                </div>
              </div>;})}
            {col.length===0&&<div style={{fontSize:12,color:'var(--muted-2)',textAlign:'center',padding:'14px 0'}}>—</div>}
          </div>;
        })}
      </div>
    </div>;
  }

  return <div>{Filters}
    <div className="card" style={{overflow:'hidden'}}>
      <table className="tbl">
        <thead><tr><th>Action</th><th>Owner</th><th>Agenda</th><th>Priority</th><th>Status</th><th>Due</th><th></th></tr></thead>
        <tbody>
          {filtered.map(a=>{const p=people.find(x=>x.id===a.ownerId);const od=isOverdue(a.dueDate,a.status);
            return <tr key={a.id}>
              <td style={{maxWidth:280}}><div style={{fontWeight:500}}>{a.title}</div>{a.description&&<div className="muted" style={{fontSize:12,marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.description}</div>}</td>
              <td><div style={{display:'flex',alignItems:'center',gap:8}}><Avatar person={p} size="sm"/><span style={{fontSize:12.5}}>{p?p.name.split(' ')[0]:'—'}</span></div></td>
              <td>{a.sectionId?<span className="tag">{secName(a.sectionId)}</span>:<span className="muted">—</span>}</td>
              <td><PrioBadge p={a.priority}/></td>
              <td><select className="select" style={{padding:'5px 26px 5px 9px',width:'auto',fontSize:12,fontWeight:600}} value={a.status} onChange={e=>setStatus(a.id,e.target.value)}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></td>
              <td className={cx(od&&'overdue')} style={{fontSize:12.5,fontFamily:'var(--mono)'}}>{fmtDate(a.dueDate)}</td>
              <td><button className="icon-btn" onClick={()=>openAction(a)}>{I.edit()}</button></td>
            </tr>;})}
        </tbody>
      </table>
    </div>
  </div>;
}

/* =========================================================
   DATA & CHARTS
   ========================================================= */
function parseText(text){
  const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return null;
  const delim = lines[0].includes('\t')?'\t':',';
  const rows=lines.map(l=>l.split(delim).map(c=>{const t=c.trim();const n=Number(t);return t!==''&&!isNaN(n)?n:t;}));
  return {columns:rows[0].map(String), rows:rows.slice(1)};
}

function ChartBuilder({data, upd, toast}){
  const [selDs,setSelDs] = useState(data.datasets[0]?data.datasets[0].id:'');
  const ds = data.datasets.find(d=>d.id===selDs);
  const [draft,setDraft] = useState(null);
  const [pasteOpen,setPasteOpen]=useState(false);
  const [pasteText,setPasteText]=useState('');
  const [pasteName,setPasteName]=useState('');
  const [drag,setDrag]=useState(false);
  const fileRef=useRef();

  const handleFile=(file)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const aoa=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,raw:true,cellDates:true});
        if(!aoa.length){toast('That file looks empty');return;}
        const columns=aoa[0].map(String); const rows=aoa.slice(1).filter(r=>r.length);
        const nd={id:uid(),name:file.name.replace(/\.[^.]+$/,''),columns,rows};
        upd(d=>{d.datasets.push(nd);}); setSelDs(nd.id); toast('Data imported: '+nd.name);
      }catch(err){toast('Could not read that file');}
    };
    reader.readAsArrayBuffer(file);
  };
  const addPaste=()=>{
    const p=parseText(pasteText); if(!p){toast('Nothing to import');return;}
    const nd={id:uid(),name:pasteName.trim()||'Pasted data '+(data.datasets.length+1),columns:p.columns,rows:p.rows};
    upd(d=>{d.datasets.push(nd);}); setSelDs(nd.id); setPasteOpen(false); setPasteText(''); setPasteName(''); toast('Data added');
  };
  const startChart=()=>{ if(!ds)return; setDraft({id:uid(),title:ds.name,type:'bar',datasetId:ds.id,xCol:ds.columns[0],yCols:[ds.columns[1]||ds.columns[0]],pinned:false}); };
  const saveChart=()=>{ upd(d=>{d.charts.push(draft);}); setDraft(null); toast('Chart saved'); };
  const numericCols = ds? ds.columns.filter((c,i)=>ds.rows.some(r=>typeof r[i]==='number')) : [];

  return <div>
    <div className="grid" style={{gridTemplateColumns:'1fr 1fr',marginBottom:22}}>
      {/* import */}
      <div className="card card-pad">
        <h4 style={{fontSize:14,marginBottom:12}}>Add data</h4>
        <div className={cx('dz',drag&&'drag')} onClick={()=>fileRef.current.click()}
          onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);}}>
          {I.upload()}
          <div style={{fontWeight:600,fontSize:13.5}}>Drop an Excel or CSV file</div>
          <div className="muted" style={{fontSize:12,marginTop:3}}>or click to browse · .xlsx .xls .csv</div>
        </div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value='';}}/>
        <button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center',marginTop:10}} onClick={()=>setPasteOpen(true)}>{I.edit()}Paste table manually</button>
      </div>
      {/* datasets list */}
      <div className="card card-pad">
        <h4 style={{fontSize:14,marginBottom:12}}>Your datasets</h4>
        <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:170,overflowY:'auto'}}>
          {data.datasets.map(d=><div key={d.id} onClick={()=>setSelDs(d.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 11px',borderRadius:10,cursor:'pointer',border:'1px solid '+(selDs===d.id?'var(--primary)':'var(--line)'),background:selDs===d.id?'var(--primary-050)':'#fff'}}>
            <div style={{width:30,height:30,borderRadius:8,background:'var(--surface-2)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}}>{I.chart({style:{width:15,height:15}})}</div>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{d.name}</div><div className="muted" style={{fontSize:11}}>{d.rows.length} rows · {d.columns.length} cols</div></div>
            <button className="icon-btn" style={{width:26,height:26}} onClick={(e)=>{e.stopPropagation();upd(dd=>{dd.datasets=dd.datasets.filter(x=>x.id!==d.id);dd.charts=dd.charts.filter(c=>c.datasetId!==d.id);});}}>{I.trash({style:{width:14,height:14}})}</button>
          </div>)}
          {data.datasets.length===0&&<p className="muted" style={{fontSize:12.5}}>No datasets yet.</p>}
        </div>
        {ds&&<button className="btn btn-primary btn-sm" style={{width:'100%',justifyContent:'center',marginTop:12}} onClick={startChart}>{I.plus()}Build chart from “{ds.name}”</button>}
      </div>
    </div>

    {/* dataset preview */}
    {ds&&<div className="card" style={{marginBottom:22,overflow:'auto'}}>
      <div style={{padding:'14px 18px',borderBottom:'1px solid var(--line-2)',fontWeight:600,fontSize:13.5}}>{ds.name} — preview</div>
      <table className="tbl"><thead><tr>{ds.columns.map((c,i)=><th key={i}>{c}</th>)}</tr></thead>
        <tbody>{ds.rows.slice(0,6).map((r,i)=><tr key={i}>{r.map((c,j)=><td key={j} className={typeof c==='number'?'mono':''}>{c}</td>)}</tr>)}</tbody>
      </table>
      {ds.rows.length>6&&<div style={{padding:'8px 18px',fontSize:12}} className="muted">+ {ds.rows.length-6} more rows</div>}
    </div>}

    {/* saved charts */}
    <div className="section-title">{I.chart({style:{width:15,height:15}})} Saved charts <span className="tt-line"></span></div>
    <div className="grid" style={{gridTemplateColumns:'1fr 1fr'}}>
      {data.charts.map(c=>{const cds=data.datasets.find(d=>d.id===c.datasetId);const cfg=chartToConfig(c,cds);
        return <div className="card card-pad" key={c.id}>
          <div style={{display:'flex',alignItems:'center',marginBottom:10}}>
            <h4 style={{fontSize:14}}>{c.title}</h4>
            <div style={{marginLeft:'auto',display:'flex',gap:4}}>
              <button className="icon-btn" title={c.pinned?'Unpin from dashboard':'Pin to dashboard'} style={c.pinned?{color:'var(--primary)'}:{}} onClick={()=>upd(d=>{const x=d.charts.find(y=>y.id===c.id);x.pinned=!x.pinned;})}>{I.spark()}</button>
              <button className="icon-btn" onClick={()=>setDraft({...c})}>{I.edit()}</button>
              <button className="icon-btn" onClick={()=>upd(d=>{d.charts=d.charts.filter(y=>y.id!==c.id);})}>{I.trash()}</button>
            </div>
          </div>
          {cds? <div className="mini-chart-wrap"><ChartCanvas type={c.type} labels={cfg.labels} datasets={cfg.datasets}/></div>
            : <p className="muted" style={{fontSize:12.5}}>Source dataset was removed.</p>}
          {c.pinned&&<div className="tag" style={{marginTop:8,color:'var(--primary-700)',background:'var(--primary-050)',borderColor:'var(--primary-100)'}}>{I.spark({style:{width:11,height:11}})}On dashboard</div>}
        </div>;})}
      {data.charts.length===0&&<div className="card empty" style={{gridColumn:'1/-1'}}>{I.chart()}<h4>No charts yet</h4><p>Import some data above, then build your first chart.</p></div>}
    </div>

    {/* paste modal */}
    {pasteOpen&&<Modal icon={I.edit()} title="Paste a table" onClose={()=>setPasteOpen(false)}
      foot={<><button className="btn btn-ghost" onClick={()=>setPasteOpen(false)}>Cancel</button><button className="btn btn-primary" onClick={addPaste}>{I.check()}Add data</button></>}>
      <div className="field"><label>Name</label><input className="input" value={pasteName} onChange={e=>setPasteName(e.target.value)} placeholder="e.g. Q2 Attrition"/></div>
      <div className="field"><label>Data (paste from Excel — first row = headers)</label>
        <textarea className="textarea" style={{minHeight:150,fontFamily:'var(--mono)',fontSize:12.5}} value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder={"Leader\tOccupancy\nA. Rao\t88\nM. Nair\t92"}/>
      </div>
      <p className="muted" style={{fontSize:12}}>Tab or comma separated. Copy straight from Excel and paste here.</p>
    </Modal>}

    {/* chart builder modal */}
    {draft&&(()=>{const cds=data.datasets.find(d=>d.id===draft.datasetId);const cfg=chartToConfig(draft,cds);const isPie=draft.type==='pie'||draft.type==='doughnut';const numCols=cds?cds.columns.filter((c,i)=>cds.rows.some(r=>typeof r[i]==='number')):[];
      return <Modal wide icon={I.chart()} title="Chart builder" onClose={()=>setDraft(null)}
        foot={<><button className="btn btn-ghost" onClick={()=>setDraft(null)}>Cancel</button>
          <button className="btn btn-subtle" onClick={()=>setDraft(p=>({...p,pinned:!p.pinned}))}>{I.spark()}{draft.pinned?'Will pin ✓':'Pin to dashboard'}</button>
          <button className="btn btn-primary" onClick={()=>{ if(data.charts.find(c=>c.id===draft.id)) upd(d=>{const i=d.charts.findIndex(c=>c.id===draft.id);d.charts[i]=draft;}); else upd(d=>{d.charts.push(draft);}); setDraft(null); toast('Chart saved'); }}>{I.check()}Save chart</button></>}>
        <div className="grid" style={{gridTemplateColumns:'240px 1fr',gap:18}}>
          <div>
            <div className="field"><label>Title</label><input className="input" value={draft.title} onChange={e=>setDraft(p=>({...p,title:e.target.value}))}/></div>
            <div className="field"><label>Chart type</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>

/* =========================================================
   COMMAND PALETTE (global search)
   ========================================================= */
function CommandPalette({data, onClose, goto}){
  const [q,setQ] = useState('');
  const [sel,setSel] = useState(0);
  const inputRef = useRef();
  useEffect(()=>{ inputRef.current&&inputRef.current.focus(); },[]);

  const results = useMemo(()=>{
    const term = q.trim().toLowerCase();
    const out = [];
    data.actions.forEach(a=>{
      if(!term || a.title.toLowerCase().includes(term) || (a.description||'').toLowerCase().includes(term)){
        const p = data.people.find(x=>x.id===a.ownerId);
        out.push({group:'Actions', icon:I.tasks, title:a.title, sub:(p?p.name+' · ':'')+a.status, go:()=>goto('actions', a)});
      }
    });
    data.agenda.forEach(s=>{
      if(!term || s.title.toLowerCase().includes(term) || (s.desc||'').toLowerCase().includes(term)) out.push({group:'Agenda', icon:I.agenda, title:s.title, sub:s.desc||`${s.mins} min`, go:()=>goto('agenda')});
      s.points.forEach(pt=>{ if(term && pt.text.toLowerCase().includes(term)) out.push({group:'Agenda', icon:I.agenda, title:pt.text, sub:'Talking point · '+s.title, go:()=>goto('agenda')}); });
      (s.links||[]).forEach(l=>{ if(term && (l.title.toLowerCase().includes(term)||(l.note||'').toLowerCase().includes(term))) out.push({group:'Links', icon:I.extlink, title:l.title, sub:'Link · '+s.title, go:()=>goto('agenda')}); });
      if(term && s.prenotes && s.prenotes.toLowerCase().includes(term)) out.push({group:'Pre-notes', icon:I.bulb, title:s.prenotes.slice(0,70), sub:'Pre-notes · '+s.title, go:()=>goto('agenda')});
    });
    const active = data.meetings.find(m=>m.status==='active');
    if(active && term){
      data.agenda.forEach(s=>{
        const n = active.notes[s.id]||'', dec = active.decisions[s.id]||'';
        if(n.toLowerCase().includes(term)) out.push({group:'Notes', icon:I.edit, title:n.slice(0,70), sub:'Notes · '+s.title, go:()=>goto('agenda')});
        if(dec.toLowerCase().includes(term)) out.push({group:'Decisions', icon:I.check, title:dec.slice(0,70), sub:'Decision · '+s.title, go:()=>goto('agenda')});
      });
    }
    data.kpis.forEach(k=>{ if(!term || k.name.toLowerCase().includes(term)) out.push({group:'KPIs', icon:I.target, title:k.name, sub:k.cat+' · '+k.value+(k.unit||''), go:()=>goto('kpis')}); });
    (data.reqs||[]).forEach(r=>{ if(!term || r.position.toLowerCase().includes(term) || (r.candidateName||'').toLowerCase().includes(term) || (r.modalities||'').toLowerCase().includes(term)){ const st=r.stage===REQ_STAGE.JOINED?'Joined':r.stage===REQ_STAGE.OFFERED?'Offered':'Open'; out.push({group:'Recruitment', icon:I.target, title:r.position, sub:st+(r.candidateName?' · '+r.candidateName:'')+' · '+(r.location||''), go:()=>goto('recruitment')}); } });
    data.people.forEach(p=>{ if(term && (p.name.toLowerCase().includes(term)||(p.role||'').toLowerCase().includes(term))) out.push({group:'Team', icon:I.team, title:p.name, sub:p.role, go:()=>goto('team')}); });
    return out.slice(0,30);
  },[q,data]);

  const grouped = useMemo(()=>{
    const g = {};
    results.forEach(r=>{ (g[r.group]=g[r.group]||[]).push(r); });
    return g;
  },[results]);

  useEffect(()=>{ setSel(0); },[q]);
  useEffect(()=>{
    const h=(e)=>{
      if(e.key==='Escape'){ onClose(); }
      else if(e.key==='ArrowDown'){ e.preventDefault(); setSel(s=>Math.min(s+1,results.length-1)); }
      else if(e.key==='ArrowUp'){ e.preventDefault(); setSel(s=>Math.max(s-1,0)); }
      else if(e.key==='Enter'){ e.preventDefault(); const r=results[sel]; if(r){ r.go(); onClose(); } }
    };
    window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h);
  },[results,sel,onClose]);

  let runningIdx = -1;
  return <div className="cmdk-overlay" onMouseDown={onClose}>
    <div className="cmdk" onMouseDown={e=>e.stopPropagation()}>
      <div className="cmdk-input">
        {I.search()}
        <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search actions, agenda, notes, people…"/>
        <span className="cmdk-kbd">Esc</span>
      </div>
      <div className="cmdk-list">
        {results.length===0 && <div className="cmdk-empty">{q?'No matches for “'+q+'”':'Type to search everything in this workspace'}</div>}
        {Object.keys(grouped).map(g=><div key={g}>
          <div className="cmdk-group-label">{g}</div>
          {grouped[g].map((r,i)=>{ runningIdx++; const idx=runningIdx;
            return <button key={idx} className={cx('cmdk-item',idx===sel&&'sel')} onMouseEnter={()=>setSel(idx)} onClick={()=>{r.go();onClose();}}>
              <span className="cmdk-item-icon">{r.icon({style:{width:15,height:15}})}</span>
              <span style={{flex:1,minWidth:0}}>
                <div className="cmdk-item-title" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title}</div>
                {r.sub&&<div className="cmdk-item-sub" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.sub}</div>}
              </span>
            </button>;
          })}
        </div>)}
      </div>
    </div>
  </div>;
}

/* =========================================================

function NotifBell({data, openAction}){
  const [open,setOpen] = useState(false);
  const ref = useRef();
  useEffect(()=>{
    const h=(e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown',h); return ()=>document.removeEventListener('mousedown',h);
  },[]);
  const overdue = data.actions.filter(a=>isOverdue(a.dueDate,a.status));
  const soon = data.actions.filter(a=>isDueSoon(a.dueDate,a.status));
  const count = overdue.length+soon.length;
  const rows = [...overdue.map(a=>({a,kind:'overdue'})), ...soon.map(a=>({a,kind:'soon'}))]
    .sort((x,y)=>(x.a.dueDate||'').localeCompare(y.a.dueDate||''));
  return <div className="notif-wrap" ref={ref}>
    <button className="icon-btn" onClick={()=>setOpen(o=>!o)} title="Reminders">
      {I.bell()}
      {count>0 && <span className="notif-dot"></span>}
    </button>
    {open && <div className="notif-panel">
      <div className="notif-head">Reminders {count>0 && <span className="tag" style={{marginLeft:8}}>{count}</span>}</div>
      <div className="notif-list">
        {rows.length===0 && <div style={{padding:'22px 16px',textAlign:'center',color:'var(--muted)',fontSize:13}}>Nothing overdue or due soon — you're on track.</div>}
        {rows.map(({a,kind})=>{ const p=data.people.find(x=>x.id===a.ownerId);
          return <div className="notif-row" key={a.id} onClick={()=>{openAction(a);setOpen(false);}}>
            <span className="notif-icon" style={{background:kind==='overdue'?'var(--red-bg)':'var(--amber-bg)',color:kind==='overdue'?'var(--red)':'var(--amber)'}}>{I.clock({style:{width:14,height:14}})}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.title}</div>
              <div style={{fontSize:11.5,color:'var(--muted)',marginTop:2}}>{p?p.name:'Unassigned'} · <span className={kind==='overdue'?'overdue':''}>{kind==='overdue'?'Overdue':'Due'} {fmtDate(a.dueDate)}</span></div>
            </div>
          </div>;})}
      </div>
    </div>}
  </div>;
}

/* =========================================================
   TRENDS (cross-meeting comparison)
   ========================================================= */
function TrendsView({data}){
  const [cat,setCat] = useState('Recruitment');
  const catKpis = data.kpis.filter(k=>k.cat===cat);
  const months = catKpis[0] ? catKpis[0].history.map((_,i)=>'M'+(i+1)) : [];

  const meetingsSorted = [...data.meetings].sort((a,b)=>a.date.localeCompare(b.date));
  const completionByMeeting = meetingsSorted.map(m=>{
    const acts = data.actions.filter(a=>a.meetingId===m.id);
    const done = acts.filter(a=>a.status==='Done').length;
    return {label:m.label, total:acts.length, done, pct: acts.length? Math.round(done/acts.length*100) : 0};
  });

  const notesCoverage = meetingsSorted.map(m=>{
    const filled = Object.values(m.notes||{}).filter(Boolean).length;
    return {label:m.label, pct: data.agenda.length? Math.round(filled/data.agenda.length*100) : 0};
  });

  return <div>
    <div style={{display:'flex',alignItems:'center',marginBottom:16}}>
      <div className="section-title" style={{margin:0}}>{I.trend({style:{width:15,height:15}})} KPI trend by category</div>
      <div className="seg" style={{marginLeft:'auto'}}>
        {KPI_CATS.map(c=><button key={c} className={cx(cat===c&&'on')} onClick={()=>setCat(c)}>{c}</button>)}
      </div>
    </div>
    <div className="card card-pad" style={{marginBottom:24}}>
      {catKpis.length? <div className="chart-wrap">
        <ChartCanvas type="line" labels={months} datasets={catKpis.map(k=>({label:k.name, data:k.history}))}/>
      </div> : <p className="muted" style={{fontSize:13}}>No KPIs in this category yet.</p>}
      <p className="muted" style={{fontSize:11.5,marginTop:10}}>Showing the last {months.length} monthly readings recorded for each KPI in {cat}.</p>
    </div>

    <div className="grid" style={{gridTemplateColumns:'1fr 1fr'}}>
      <div className="card card-pad">
        <h4 style={{fontSize:14,marginBottom:4}}>Action completion by review</h4>
        <p className="muted" style={{fontSize:12,marginBottom:12}}>Share of actions marked Done, per meeting they were created in.</p>
        <div className="mini-chart-wrap">
          <ChartCanvas type="bar" labels={completionByMeeting.map(m=>m.label)} datasets={[{label:'% Completed', data:completionByMeeting.map(m=>m.pct)}]}/>
        </div>
      </div>
      <div className="card card-pad">
        <h4 style={{fontSize:14,marginBottom:4}}>Discussion coverage by review</h4>
        <p className="muted" style={{fontSize:12,marginBottom:12}}>Share of agenda sections with discussion notes captured.</p>
        <div className="mini-chart-wrap">
          <ChartCanvas type="bar" labels={notesCoverage.map(m=>m.label)} datasets={[{label:'% Sections noted', data:notesCoverage.map(m=>m.pct)}]}/>
        </div>
      </div>
    </div>

    {meetingsSorted.length<2 && <p className="muted" style={{fontSize:12.5,marginTop:16}}>Trends across reviews get more useful once you've run a few monthly cycles — start a new month from the Meetings tab when this one wraps up.</p>}
  </div>;
}

/* =========================================================
   INTEGRATIONS / DATA BRIDGE
   ========================================================= */
function IntegrationsView({data, upd, toast}){
  const fileRef = useRef();
  const [preview,setPreview] = useState(null); // {kind, columns, rows}

  const handleImportFile = (file)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      try{
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const aoa = XLSX.utils.sheet_to_json(ws, {header:1, blankrows:false});
        if(!aoa.length){ toast('That file looks empty'); return; }
        const columns = aoa[0].map(c=>String(c).trim());
        const rows = aoa.slice(1).filter(r=>r.length);
        setPreview({columns, rows, name:file.name});
      }catch(err){ toast('Could not read that file'); }
    };
    reader.readAsArrayBuffer(file);
  };

  const colIndex = (cols, ...names)=>{
    for(const n of names){ const i = cols.findIndex(c=>c.toLowerCase().replace(/[^a-z]/g,'')===n); if(i>=0) return i; }
    return -1;
  };

  const runImport = ()=>{
    if(!preview) return;
    const {columns, rows} = preview;
    const nameI = colIndex(columns,'name','fullname','employeename');
    const roleI = colIndex(columns,'role','title','designation');
    if(nameI<0){ toast('No "Name" column found — check your file headers'); return; }
    let added=0, updated=0;
    upd(d=>{
      rows.forEach(r=>{
        const name = String(r[nameI]||'').trim(); if(!name) return;
        const role = roleI>=0 ? String(r[roleI]||'').trim() : '';
        const existing = d.people.find(p=>p.name.toLowerCase()===name.toLowerCase());
        if(existing){ if(role) existing.role = role; updated++; }
        else { d.people.push({id:uid(), name, role, color:colorFor(name)}); added++; }
      });
    });
    toast(`Imported: ${added} added, ${updated} updated`);
    setPreview(null);
  };

  const exportPeople = ()=>exportRowsToExcel('chemops-people.xlsx','People', ['Name','Role'], data.people.map(p=>[p.name,p.role||'']));
  const exportActionsX = ()=>exportRowsToExcel('chemops-actions.xlsx','Actions',
    ['Title','Owner','Priority','Status','Due Date','Agenda Item','Description'],
    data.actions.map(a=>{ const p=data.people.find(x=>x.id===a.ownerId); const s=data.agenda.find(x=>x.id===a.sectionId);
      return [a.title, p?p.name:'', a.priority, a.status, a.dueDate||'', s?s.title:'', a.description||'']; }));
  const exportKpisX = ()=>exportRowsToExcel('chemops-kpis.xlsx','KPIs',
    ['Category','Name','Value','Unit','Target','Direction'],
    data.kpis.map(k=>[k.cat,k.name,k.value,k.unit||'',k.target==null?'':k.target,k.dir]));

  return <div>
    <div className="card card-pad" style={{marginBottom:20,background:'var(--primary-050)',border:'1px solid var(--primary-100)'}}>
      <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
        <div style={{width:36,height:36,borderRadius:10,background:'#fff',color:'var(--primary)',display:'flex',alignItems:'center',justifyContent:'center',flex:'0 0 36px'}}>{I.link2({style:{width:18,height:18}})}</div>
        <div>
          <h4 style={{fontSize:14.5,marginBottom:4,color:'var(--primary-700)'}}>About HRMS sync</h4>
          <p style={{fontSize:12.5,color:'var(--ink-2)',lineHeight:1.6}}>This console runs entirely in your browser with no backend server, so it can't hold live API credentials or run a real-time sync with an HRMS (Workday, SAP SuccessFactors, Darwinbox, etc.). The practical bridge is file-based: export an HRMS report to Excel/CSV, import it below to update People here — and export your action/KPI data in a clean format to feed back in. For true live sync you'd need a small backend service holding the HRMS API keys.</p>
        </div>
      </div>
    </div>

    <div className="grid" style={{gridTemplateColumns:'1fr 1fr',marginBottom:22}}>
      <div className="card card-pad">
        <h4 style={{fontSize:14,marginBottom:12}}>Import people from HRMS export</h4>
        <div className="dz" onClick={()=>fileRef.current.click()}>
          {I.upload()}
          <div style={{fontWeight:600,fontSize:13.5}}>Drop an Excel/CSV export</div>
          <div className="muted" style={{fontSize:12,marginTop:3}}>Needs a "Name" column, "Role" optional</div>
        </div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleImportFile(e.target.files[0]);e.target.value='';}}/>
      </div>
      <div className="card card-pad">
        <h4 style={{fontSize:14,marginBottom:12}}>Export for HRMS / reporting</h4>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <button className="btn btn-ghost" style={{justifyContent:'flex-start'}} onClick={exportPeople}>{I.download()}People roster (.xlsx)</button>
          <button className="btn btn-ghost" style={{justifyContent:'flex-start'}} onClick={exportActionsX}>{I.download()}Action tracker (.xlsx)</button>
          <button className="btn btn-ghost" style={{justifyContent:'flex-start'}} onClick={exportKpisX}>{I.download()}KPI library (.xlsx)</button>
        </div>
      </div>
    </div>

    {preview && <Modal wide icon={I.upload()} title={'Preview — '+preview.name} onClose={()=>setPreview(null)}
      foot={<><button className="btn btn-ghost" onClick={()=>setPreview(null)}>Cancel</button><button className="btn btn-primary" onClick={runImport}>{I.check()}Import {preview.rows.length} rows</button></>}>
      <div style={{overflow:'auto',maxHeight:300}}>
        <table className="tbl"><thead><tr>{preview.columns.map((c,i)=><th key={i}>{c}</th>)}</tr></thead>
          <tbody>{preview.rows.slice(0,8).map((r,i)=><tr key={i}>{r.map((c,j)=><td key={j}>{c}</td>)}</tr>)}</tbody>
        </table>
      </div>
      {preview.rows.length>8&&<p className="muted" style={{fontSize:12,marginTop:8}}>+ {preview.rows.length-8} more rows</p>}
    </Modal>}
  </div>;
}

function RequisitionModal({req, data, me, onClose, save, remove}){
  const isNew = !req || !req.id;
  const blank = {position:'',modalities:'',location:'',hiringManagerId:'',experience:'',priority:'Medium',approvalDate:todayISO(),ownerId:'',stage:REQ_STAGE.OPEN,currentStage:'Sourcing',candidateName:'',candidateExp:'',offeredDate:'',tentativeJoin:'',joinDate:'',backoutCount:0};
  const [f,setF] = useState(isNew? {...blank} : {...req});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const people = data.people;
  const commit = ()=>{
    const pos = (f.position||'').trim().replace(/\s+/g,'_'); // no whitespace in position
    if(!pos){ return; }
    save({...f, position:pos, id:f.id||uid(), createdAt:f.createdAt||Date.now()});
    onClose();
  };
  const tat = reqTat(f);
  return <Modal wide icon={I.target()} title={isNew?'Add open position':'Edit position'} onClose={onClose}
    foot={<>
      {!isNew && <button className="btn btn-danger" style={{marginRight:'auto'}} onClick={()=>{remove(f.id);onClose();}}>{I.trash()}Delete</button>}
      <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
      <button className="btn btn-primary" onClick={commit}>{I.check()}{isNew?'Add position':'Save changes'}</button>
    </>}>
    <div className="row2">
      <div className="field"><label>Position (no spaces — use _)</label><input className="input" autoFocus value={f.position} onChange={e=>set('position',e.target.value.replace(/\s+/g,'_'))} placeholder="Sr_Scientist_ProcessChem"/></div>
      <div className="field"><label>Modalities</label><input className="input" value={f.modalities} onChange={e=>set('modalities',e.target.value)} placeholder="Process Chemistry"/></div>
    </div>
    <div className="row2">
      <div className="field"><label>Location</label><input className="input" value={f.location} onChange={e=>set('location',e.target.value)} placeholder="Ahmedabad"/></div>
      <div className="field"><label>Experience requirement</label><input className="input" value={f.experience} onChange={e=>set('experience',e.target.value)} placeholder="8-12 yrs"/></div>
    </div>
    <div className="row3">
      <div className="field"><label>Hiring manager</label>
        <select className="select" value={f.hiringManagerId} onChange={e=>set('hiringManagerId',e.target.value)}>
          <option value="">— select —</option>{people.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </div>
      <div className="field"><label>Recruitment owner</label>
        <select className="select" value={f.ownerId} onChange={e=>set('ownerId',e.target.value)}>
          <option value="">— select —</option>{people.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </div>
      <div className="field"><label>Priority</label>
        <select className="select" value={f.priority} onChange={e=>set('priority',e.target.value)}>{REQ_PRIORITIES.map(p=><option key={p}>{p}</option>)}</select>
      </div>
    </div>
    <div className="row3">
      <div className="field"><label>Approval date</label><input type="date" className="input" value={f.approvalDate||''} onChange={e=>set('approvalDate',e.target.value)}/><div className="muted" style={{fontSize:11,marginTop:4}}>Shows as {fmtDMY(f.approvalDate)}</div></div>
      <div className="field"><label>TAT (days)</label><input className="input" disabled value={tat==null?'—':tat} style={{color:tatColor(tat),fontWeight:700,fontFamily:'var(--mono)'}}/><div className="muted" style={{fontSize:11,marginTop:4}}>Auto from approval → {f.stage===REQ_STAGE.JOINED?'join':'today'}</div></div>
      <div className="field"><label>Current hiring stage</label>
        <select className="select" value={f.currentStage} onChange={e=>set('currentStage',e.target.value)}>{HIRING_STAGES.map(s=><option key={s}>{s}</option>)}</select>
      </div>
    </div>
    {(f.stage===REQ_STAGE.OFFERED||f.stage===REQ_STAGE.JOINED) && <>
      <div className="divider"></div>
      <div style={{fontSize:12,fontWeight:700,color:'var(--primary-700)',marginBottom:10}}>Candidate details</div>
      <div className="row2">
        <div className="field"><label>Candidate name</label><input className="input" value={f.candidateName} onChange={e=>set('candidateName',e.target.value)} placeholder="Full name"/></div>
        <div className="field"><label>Total experience</label><input className="input" value={f.candidateExp} onChange={e=>set('candidateExp',e.target.value)} placeholder="e.g. 13 yrs"/></div>
      </div>
      <div className="row3">
        <div className="field"><label>Offered date</label><input type="date" className="input" value={f.offeredDate||''} onChange={e=>set('offeredDate',e.target.value)}/></div>
        <div className="field"><label>Tentative date of joining</label><input type="date" className="input" value={f.tentativeJoin||''} onChange={e=>set('tentativeJoin',e.target.value)}/></div>
        {f.stage===REQ_STAGE.JOINED && <div className="field"><label>Actual join date</label><input type="date" className="input" value={f.joinDate||''} onChange={e=>set('joinDate',e.target.value)}/></div>}
      </div>
    </>}
  </Modal>;
}
